front:
  text: 女丹合編女真丹訣
  hash: sha256:bb86c2c0455c829ff207ca919516b6774d90894b23add697f5c1f1707f10c905
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_15p001a}
body:
  text: 蒲陽無心子陳永淸著太陰煉形祕訣女子修真原有訣不是憑空妄擬説人身原自有陰陽陰陽道理宜三復男子精液陽中陰女子精液陰中陽快尋明師求指破返老還童在故鄉靜裏修真不必猜專候身中一陽來還從先天分境界好把金烏向月栽阿誰設此修真法惹得佳人來削髮朝朝日日守空房心死如灰操生殺可憾赤龍這妖孽無端日月長來繞利刀架上赤龍頭斬斷龍頭天未曉雙手緊緊抱戶口恐防黃虎順墻走牽他回家亦不難快快與他一把火跨鶴坐時將息數寒聲玉露如香乳微微送過紫微宫遍體酥綿直到午文武火候自家裁莫使紛紛亂靈台時時恐防真種出提回乳房結聖胎聖胎一朝聚乳房夀與天齊不可量如此修真今結局管教七日復生陽七日天心如可復即是上乘一妙著以後便同男子功般般口訣要師説三斬赤龍祕訣女子修真好大膽提刀便把赤龍斬背夫逆母毒心腸祇為人身難得轉斬時用盡平生力休使精華往外泄逆轉黃河水倒流陰消陽長憑呼吸呼吸原來一爐火黃芽抽在鍋中煮薰薰熱氣上沖天降下重樓入土釜竹破還須用竹補休將砂汞銀鉛煮取其同類兩相生快快收來聚兩乳功奪乾坤造化機人人有箇上天梯陽生陰退無他訣祇在神思不著迷不著迷兮有主見暗中提把無情劍赤龍斬斷兩三番方顯佳人好手段手段高時法力高采鸞不二與雲翹一般俱是裙叉女豈讓仙姑姓氏標裙叉立志要彌堅火裏栽花放白蓮學得慈悲心一片方能平地直登仙祇有金丹一粒砂朝朝日日放光華形如黍米甘如蜜起死回生功倍加可惜金丹人不覺鬼神未必能猜著箇中幻妙要師傳卻是家園一味藥女子修真祕訣佳人日日學參禪不語不言心要專若有一毫私欲念管教爐內走真鉛真鉛本是先天藥何故世人猜不著把守關門要小心恐他偷走出房屋他若出時休膽怕狂風烈火一齊架催他直上九重天奪取乾坤乳上挂若無節烈休傳道恐被癡情暗説笑泄漏玄機天不饒這場罪過卻非小不知心性莫傳訣恐向旁人糊亂説苦口叮已再三休將仙道當茅物獨有婦人性情乖一心祇想赴瑤台試將此事逢人講豈是裙叉學得來學道婦人多出醜無端撞著一羣狗引他暗地拜盲師撿點功成驗臍口不如穩坐在香厨一孝公婆二順夫死後魂歸淸淨土西方佛祖把名呼奉勸婦人休學道道中假道亂真道存心忠厚並仁慈管甚假真真假道縱然真道不須求欲火頻生不自由年紀輕輕今出醜爾知羞與不知羞
