front:
  text: 女丹合編坤訣
  hash: sha256:a96c6cd12af716aacdf7266e6871509e5ce63dd3fa47359e85f497ba76a0470a
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_06p001a}
body:
  text: 淸靜元君孫不二著濟一子金谿傅金銓較訂眞傳有訣眞傳有訣夫女子秉坤柔之德而眞陰之中具有眞陽脩煉較易今得此坤脩信乎昇天之階級渡世之梯航也其訣俱在有中著力有者無之始從有至無卽是眞陽之位此二句雖重在命功卻合性命而言乃坤道第一大關鍵上句要於有中還無下句於無中生有庚甲須知庚甲申明命功入手處庚者金也虎也甲者木也龍也其義已詳乾集庚金爲脩煉之本甲木常畏其尅而尅中反有生機煉丹家最喜死中求活故庚虎旣降甲龍卽興一降一興生殺之機已伏顚倒之理彌眞知此生殺顚倒之時用法斬龍之頭牽虎之尾使龍不興雲虎不招風風雲息而天淸月皎龍虎降而性合情投歸爐起煉立結黍珠保命之法莫妙於此知字有濳心守視之意風欲來卽須擒虎雨將降乃可斬龍不先不後及時斬取方可煅煉學庸詳說易理宜參不明理又無以學道也從經學參入方不落空於學庸下得轉語斯爲見道至如丹道統於易中彖曰至哉坤元萬物資生坤屬老陰陰極陽生順承乎天則生人生物順承乎己則成道成眞細究坤之眞陽發於何處卽知吾身眞一產於何方求得此一固得此一命寶乃全此求在吾者不得向外覓取故曰宜參性宗須徹性命雙脩陰陽相接性功爲入道之始終於性不徹此寶未能常住必如秋月潭纖塵不染無始之始旣已了然不空之空咸歸自在斯性命雙脩陰陽相接矣教人熟辨有無莫負一腔𤍠血陰陽卽有無要於藏經中留心三日則眞陽之來眞陰之往俱已井然來龍之頭可斬去虎之尾能留二炁相交絪緼和洽方成法體不然徒費心血又何能脩煉耶機在目前氣由此拔上有天谷下有泉穴認定二處不宜差别臨機切要惟是以目始意以意始氣以氣凝神以神煉眞通天達地無往不靈苟或天谷不𤍠氣不上升湧泉不𤍠氣不下行必須意目注視上下其力以引之認定二穴不可少有差錯子午行功久久純熟再行烹煉應時須悟參脩自有黃芽白雪以上坤道大統研求印證貫徹於心然後入手下功擒歸之龍含珠驅回之虎摇尾黃芽生於土釡白雪產於瓊宫大還到手隨面壁以忘忘所欲從心尊帝天而穆穆便到西池會王母白旌黃斾自來迎一聲霹𩆝天庭闢脫去胎州重濁身
