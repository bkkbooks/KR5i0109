front:
  text: 女丹合編女金丹上卷規戒
  hash: sha256:9fc3e98c6e28f5efe99a561f085a0c64ad8b0859ad2f43c6c18b5a730b9b0340
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_09p003a}
body:
  text: 用中貞一子著立志入道天陽地陰乾剛坤順陰無陽不長陽無陰不生剛柔得其中和水火始能既濟陰陽必有四偶人物由茲孕生是乾坤皆稟真元之氣男女各具不死之身乾曰大生可以道成正覺坤曰廣生亦能果證元君如謂坤陰難入仙道何以王母長處崑崙蟾蛾竊梁間之丹永作月宮皇后逍遙讀漆園之書自號瑤池謫仙洛神巫女自古維昭紫姑湘𡚱於今維烈跡載史篇固可考也身秉坤德豈不能乎特以沈溺欲海不發入道之心安能跳出迷津以作登雲之女性本陰柔見多偏隘罔知四德寧曉三從過惡當改不知改福田宜修未能修縱無情之欲喪本性之真自暴自棄愈趨愈下豈知人世如浮雲塵寰原孽網與其將身入輪回何若回頭登彼岸蓬萊信有路只在目前玉京豈無梯須由心悟佛即是心心即是傲仙能傲我我亦可仙玉汞金鉛實度生之寶筏丹經釋典誠入道之天梯特以天機不輕泄語多露尾藏頭即使琅王函巳卒吟還要參師訪友聞一訣方知一訣進一程更有一程果能擺脫塵緣拜明師以求心法何難步入瑤闕謁金母而列仙班人須立志各自勉旃入門戒規十二條一戒妄念迭生二戒縱欲貪淫三戒剛暴殘刻四戒煩惱嗔怒五戒憂思驚恐六戒目多妄視七戒耳多妄聽八戒多言狂妄九戒慳吝惜財十戒殺生害命十一戒不節腥葷十二戒慢道輕師婦女所當戒者雖不止十二條能戒此十二件去仙不遠矣一戒妄念迭生心之所發為念念頭正則所行無不正念頭差則所為無不差蓋心為天君念為役使天君泰然百體從令也妄念者一切狂妄不正之念也古人所謂無念之念方是正念即真意也這點真意卻少不得有這點真意方能煉鉛求汞凝神養胎丹經所謂行住坐臥不離這箇這箇真意也豈若此不正之妄念千頭萬緒莫可名狀始則憑空而來繼則鬬境成幻一念未已一念續之緣此及彼觸境生心想到得意時不禁自慶自足想到失意時曷勝白怨自悲盡日之中無有寧息宵之寢也神亦不存矣夫所發之念既妄則見於行者無不妄如此妄人安足語仙道哉即使未見諸行事而無端妄想神目如電指視何其嚴乎况人之生死輪回莫不由一念造之鍾情之區即受生之地噫一念之輪回種無邊之生死人顧可不愼所發哉若夫至人知此無根無據之妄念牿亡吾性死趨六道精心體認勤加覺察此念何自而起何自而滅未起之前如何既起之後如何知此一念起即提慧劒斬之務拔其根勿使潜滋暗長於隱微之中務令此性空虛靜寂萬念俱泯一靈獨存瀟瀟灑灑活活潑潑如此則私欲盡淨天理流行仙道不遠矣故入門者先須於此關頭謹守勿忽方是果決烈女道中法器也二戒縱欲貪淫人所最難破者色欲一關耳人胡為有生因這點淫根未拔見淫事而性即入男女之身根以投胎而生人胡為有身因父母淫姤而始成此身人從淫事而來故其習染最深而根株未易拔也且人所恃以生者全憑這點精氣貪淫則精傷精傷則陽關不固百病交作古人謂服藥百粒不如獨宿一宵惜此精氣也惜得幾分精氣即多𣷹得幾年夀數基成無漏陽關一閉則長生矣况婦女之性情易蕩一貪淫事則欲火焚身情難自禁無夫以遂其欲必有喪廉之行即使不至失身淫心一動火逼一身精氣已不存於中矣昔韋十一娘學道其師化一偉男子百般調戲且致逼污而此心不易方授仙術故淫根未拔者多失仙緣即或幸聞法而此道乃色相中事亦行不得即或行之而所結之胎特一淫胎一朝出神必見淫姤而投胎前功盡廢矣天宫仙女多有謫下紅塵者莫不因情緣未斷之故可不戒哉戒之之法要在不思不視而已不思則能禁情於未然不視又能絶念於當境文昌帝君云未見不可思當見不可亂既見不可憶誠戒色良針也然豈徒不思不亂不憶已哉務要拔盡情根看色即是空空即是色對境忘情在欲無欲方可與言仙道若抱淫欲之心以希上真之道而能有成者吾未之聞也附考韋十一娘宋長安貧女也嫁同里鄭氏子鄭子喜遊俠屢諫反目政和間往邊城從軍久無音回伯子不良每以言語調戲韋正色拒之因憶趙道姑自幼相愛况有道術可傳遂投姑姑欣然挈入菴中教以法術日暮姑下山留韋獨宿戒曰勿飲酒及淫色韋思深山中焉有此二事更餘一男子踰牆入韋速起問之不答男子近前擁抱拒不從彼求益堅韋抽劒欲擊彼出劒相刺甚精利韋知不及棄劒哀求曰妾命薄久戒塵心何忍亂我且師有明戒誓不敢犯彼以劒加頸逼從韋引頸受之其人收劒笑曰知子心不變矣視之則道姑也從此盡授其術三戒剛暴殘刻剛美德也人無剛則柔懦不振百無一成這個剛字卻少不得然剛而無禮則流於暴很戾自用不知退讓不顧是非不恤人言無禮於舅姑不和於妯娌不敬於夫子虐凌於子姪苛責於奴婢是謂悍婦故剛而繼以暴每多殘忍不仁刻薄寡恩也夫人必有仁慈之心而后有胞與之量聖母元君視天下為一家視中國如一人凡天上地下一切物類莫不保愛若赤子一般何嘗起點憎惡之心而流於殘刻哉觀音大士稱為慈航以其仁慈成性普濟衆生而為浩劫之慈母也故神氣亦浩劫不朽如剛暴則失坤陰柔順之德殘刻又無坤厚廣生之量如此之人天上選爾何地下留爾奚益不如速死之為愈也安望長生夫惟戒之性暴者養以和緩靄然如春風之宜人而與物悉無忤也殘刻者易以慈惠浡然如時雨之及物而無人不沾其恩也見於外如此而性之在中無不靈明自在活活潑潑渾含生機於無窮矣而謂慈航觀音不虛座以待爾哉四戒煩惱嗔怒煩惱者遇事煩勞而生惱恨心也人生一世孰無事業須慢慢做將去不計功過不辭辛苦不憚煩勞事方有濟如因煩勞而生惱恨天下事何者能成至養性更要耐煩緣此心馳放已久一旦操存如生龍活虎伏之未肯即伏降之未肯即降須從容涵養不拘不束勿忘勿助任其自然今日養一分則得一分明日養一分又得一分養到十分自有圓明時候若以難純而遂生煩惱其性豈能圓明乎嗔怒者事不如己意而嗔恨怨怒也試思天下事豈盡能如己意未必嗔怒而事遂能如已意何不思之甚也亦惟安於遇耳况嗔怒心甚者其心必毒死多投於毒蛇腹中夏臘以嗔怒而化蛇郗后以嗔怒而變蟒此固明徵也但嗔怒有因煩惱起者煩惱有由嗔怒生者二者皆為心纍急戒之可也五戒憂思驚恐思傷脾憂思則氣鬱而不伸恐傷腎驚恐則神散而不藏事未至則憂思不已事將來而驚恐不休蔽性之端亦損精耗神之具不戒多成內傷之疾戒之之法惟鎮定空寂心不留物憂至則思理理不能遣聽其自然憂之何益且人所以生此驚恐心者恐其禍及吾身也平日仰不愧天俯不怍人我無虧於人人必不害我何驚之有即使橫禍忽來而死生有命亦順受之而已聖人泰山崩前而不驚刀鋸加頸而不恐神定故也昔宛丘以色聲香味觸喜怒憂思悲恐驚試靑烏公有二者未泯其迹僅成地仙學者不於此著力亦凡夫耳安冀有成六戒目多妄視目為六賊之魁眼見色心即為色所牽而魂從眼漏其傷在肝蓋人之魂夜藏於肝日寓於目妄視則魂漏於眼夜多夢寐聖人無夢以其能收眼光內照不使魂日馳於外亦不使心為色所引也故欲收其心先攝夫目其法常將眼光返照玄關一竅之中使此性靈明不昧以養如如不動之神自然目不妄視心不妄動魂不外遊神不外馳而先天之氣歸於身矣七戒耳多妄聽腎開竅於耳妄聽則心為聲動精從耳漏其傷在腎腎為先天真一之水能灌溉一身之營衛傷腎則肌膚憔悴精脫耳聾人能常凝耳以內聽不惟使心不為聲動而心得所養精亦常凝於腎去仙不遠矣八戒口多妄言言易招尤南容三復白圭聖人稱之以其能謹言也多言則不足以養吾心之仁故司馬牛問仁聖人以訒言告之制外養中也且言為心聲心藏神多言則神傷能守口如瓶神自常住於心性不因言以亂而酬酢往來間亦不失口於人矣九戒慳吝惜財財以濟用天下無人不需財但要不為所迷耳如一味慳吝分文不捨則雖堆金等山嶽能買無常不來乎與其積財自富而作一家之守財奴孰若散財積福以結道中之仙緣自來仙真莫不由廣種福田而成古人云若是吝財並惜寶千萬神仙不肯來蓋至人等富貴若浮雲視金玉如糞土一塵不染一物不戀即此身且非我有况身外之財乎故入道者此關更宜打破休為所愚十戒殺生害命天地以好生為心聖人以愛物為懷天地生之我輒殺之大干天地之和聖人愛之我竟害之大非聖人之仁况人物同此性命好生惡死人物同情已有生惟恐其傷豈物有生不懼其死推己及物必有不忍殺害者古人云汝欲延生須放生我既欲學道以求長生要當推己心以惜物命雖曰物命在人而好殺傷生多遭慘報夫救蟻中狀元之選放雀獲明珠之報古往今來以放生得福者多矣人可不慈心於物以養我好生之仁哉十一戒不節腥葷腥葷雖養人之物而齊戒斷味者未聞有傷可見養生不盡在血肉也上古草衣木食其民多夀自火化興血肉食民遂夭折者何也蓋肥甘動火之物食之過多每易縱情損精不如穀食得天地中和之氣為至淸至潔之味其養生最好况食物類之肉以補我肉其心亦有所不忍佛家絶腥葷蓋不嗜口腹以增殺孽也南嶽夫人戒楊羲曰修道之士不欲見血肉見而避之不如不見已死之物即為尸氣觸之最能害道入道故貴節腥葷十二戒慢道輕師天地間至貴重者莫若金丹大道可以出凡籠可以了生死可以超九祖古人萬劫一遇夫豈等閒細事哉雖貴如漢文帝猶且折節於河上公富如馬丹陽猶且虛心於王重陽武如漢鍾離猶且低頭於王玄甫文如抱朴子猶且屈膝於鄭思遠况下焉者乎故求道者挾不得一己之富貴逞不得一已之勢力恃不得一已之學問聰明必虛心誠求如伍沖虛灑掃役力切問二十載方能得之而授之者亦不輕易抱朴子曰受真一之訣皆有盟文歃白牲之血以旺相之日受之以白銀白絹為約尅金契而分之輕說妄傳其神不佑也沖虛子曰自古仙真授受真道必淸淨齊醮如科條具信贄刺血盟天奏告上帝三台北斗南辰三官四聖五帝司命各位下請命降允而後可傳凡傳一人遍天地間神聖無不告知者倘有惡類妄自行財及詭詐私相授受師弟同受考掠可不愼哉使者既不輕易以傳授者何可輕褻抱朴子曰明師之恩誠為過於天地也重於父母也可不尊崇之乎觀此可見求道者既遇真師即當尊崇恭敬勤求切問厯久不怠方得卒聞心法而升天有路矣
