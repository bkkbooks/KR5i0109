front:
  text: 女丹合編女丹詩集前編
  hash: sha256:15def4e34c32169d089e9fd3c7dec9fd42eb897cf4e1ace51b137e909fe2c879
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_20p001a}
body:
  text: 濟一子金谿傅金銓彙輯吳采鸞仙姑三首幷序采鸞吳猛女也猛仕吳爲西安令至人丁義授以道術猛授南昌許遜遜爲旌陽令聞丹陽諶母有道同往訪之母以道妙授遜遜請幷授猛母不許命轉授之鸞師事丁義女秀英道成隨父上昇心如一片玉壺冰未許纖塵半點侵霾卻玉壺全不管瑤臺直上最高層寵辱無稽何用爭浮雲不礙月光明任呼牛馬俱堪應肯放纖塵入意城身居城市性居山傀儡場中事等閑一座須彌藏芥子大千文字總堪删樊雲翹仙姑六首幷序樊雲翹劉綱妻也俱有道術能檄召鬼神禁制變化潛修密證人不能知爲令尙淸靜簡易民受其惠年𡻕大豐遠近忻仰暇日常與綱較法綱作火燒客碓舍火從東起夫人布雨從西來禁之庭中桃兩枝綱呪一枝落籬外夫人呪入篋中綱唾盤中成魚夫人唾爲獺食之一日與綱入四明山路值虎綱禁之虎伏而號夫人薄而觀之虎不敢仰視擒歸繫牀側將昇之日縣廳側有大皂莢樹綱由樹頂飛舉夫人平坐牀上冉冉如雲之騰遂同昇天後再顯於藍橋舟中詔裴航入道以妹雲英妻之共成正果焉乾象剛兮坤德柔工夫先向定中求澂淸一勺瑤池水明月何須七寶修龍虎猿馬費牢籠略放飛騰業障蒙至寂如如眞妙法擒來化作一天風養性還須先靜心何勞乞巧更穿鍼鐵牛牽得隨身轉万顯無邊慧業深何須拜禱乞長生端的元神徹底淸粉碎虛空渾自在摩尼舍利總虛名一間金屋住雙姝總有儀秦意不孚若得月中生箇日驪龍吐出夜光珠愛河波浪起層層濃則沈兮淡則升鼓楫若能施勇斷蓬萊弱水豈難憑月華君崔少𢆯六首并序崔少𢆯唐季時汾州剌史崔恭少女生而端麗幼而性宗及笄歸盧陲十年苦功二十四𡻕成道陲官閩嶠過建溪武夷山雲中見紫霄元君扶桑夫人間陲曰月華君來乎陲怪問之云吾昔爲玉皇左侍書號月華君以宿緣謫爲君妻後罷府家洛陽留書遺陲曰得之一元匪受自天太老之眞無上之仙光含影藏形於自然眞安匪求人之久留淑美其眞體性剛柔丹霄碧天上聖之儔百𡻕之後空餘故邱書畢而化初三纔見影如娥相對陽光皎潔多要得絪緼凝玉液先探消息捉金波性宗明處命基堅九轉河車九鼎全金虎玉龍相會合三花捧出小神仙心如止水自悠悠常寂常惺好進脩養得烏肥培兔瘦靈芝秀出碧峯頭地下須知亦有天專心求己卽求仙一朝悟徹陰陽旨惟在生生一氣先綠鬢朱顏曾幾時須臾鶴髮亂如絲開簾瞥見梅花發一段春光莫放遲不求外護不參禪眼底滄桑任變遷丹徑須知從直上𢆯珠只在我胸前唐廣眞眞人四首并序唐廣眞嚴州人事母至孝旣嫁得血疾夢道人與藥而愈自是好道䖍奉何仙姑一日親授元妙宋湻熙中有三仙引至海邊跨大蝦蟇渡海隨遊名山仙問曰汝欲超凡入聖耶留形住世耶棄骨成仙耶對曰有母在願奉終養賜丹一粒吞之遂不穀食後召入德夀宫封寂靜凝神眞人玄機覿面費搜尋著眼方知至理深性學難將文字指業緣了當見眞心心性原來最易明但隨峯頂暮雲晴東西南北皆堪住便可蓬山碧海行不識性兮不識命剖破乾坤分兩途但教相合成丹日醉倒壺中不用扶無嗔無喜氣和醺應事隨機風逐雲虎伏龍馴心自靜碧天明月白紛紛玄靜散人周元君五首并序玄靜散人姓周氏甯海東牟王處一之母也處一生於金熙宗皇統二年孕時夜夢紅霞繞身驚寐而化幼多頴悟一日遊山中遇老人坐大石謂之曰子異日揚名帝闕爲道教宗主遂摩頂而去嘗作頌自歌曰爭甚名奪甚利不如聞早脩心地自家脩證自前程自家不作爲羣類大定八年遇重陽祖師於全眞菴請爲弟子奉母同脩各受大道家貧力薄苦志脩持後處一應名赴闕奏對有云鏡明猶能鑑物况天地之鑒無幽不燭何物可逃所謂天地之鑒卽自己靈明之妙也於是大稱旨章宗嘆曰淸明在躬志氣如神先生之謂也明年母夀九秩表乞侍養一日母謂處一曰我歸期已至因示不貪生不懼死之語而化葬畢語門人曰羣眞相約吾去矣焚香沐浴而昇坤訣須從靜裏求靜中卻有動機留若教空坐存枯想虎走龍飛丹怎投一點靈臺磐石安任他榮落態千般陽光本是摩尼寶箇裏收藏結大丹心似曹溪一片秋好從子午下功脩魚龍潑剌波還靜只有長空月影留輕烟薄霧障空虛卻使靈明無處居憎愛榮枯皆利刄予如傷子怎尋予性命先須月窟參擒龍撥虎莫遲延陽生之候眞陽漏黍米如何得保全
