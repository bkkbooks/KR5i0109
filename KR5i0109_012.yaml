body:
  text: 魔不退至死不變貧富不移堅貞不二乃可授此三層妙法循序漸進暗有仙真護持一切內外妖魔不敢擾害終期大成至於有夫之婦人事未了切勿妄傳只宜勸伊養性寡欲孝姑敬夫待時而傳倘恂情輕授確有可據無一毫妄誕之語倘恍之論實是天機不可輕泄得其傳者俱係前緣愼之珍之午是陰之根子乃陽之苗男子外陽而內陰女子外陰而內陽男子奪外陽而點內丹女子奪內陰而點外丹也女子行功第一要明採身中之陰補身中之陽陽者精與氣也陰者神與血也採於何時須知月信將潮之時與月信潮盡之候夫信者何如人出外未歸而信先至也信至潮未至之時急忙用功或盤膝大坐或觀音半坐俟身中神氣發動回光返照乳房穴及血海鼻息調勻將所動之神氣用真意即黃婆也從血海升入曹溪一路直達囟門由上降下到乳房而仍歸於中極但此法不可妄用信來而潮未來之時可用在兩日之半後潮盡可用若潮信未淨妄行採取必至殺身謹記此法少年血氣旺者心地靜者三月之久便可斬赤龍而復還童體面如桃花如果功到此時與醉漢相似昏昏默默晝夜光明不散行持一年基可築固而人仙之功程驗矣中年婦女修煉須用太陰煉形之法夫行此法者須除思去欲忘情絶慮方行此道算定某日某時月信至未至前二三日即宜靜養待至信到於靜室內調息端坐兩手放膝前用食指囚子午上如𡔨閉目存神調息內觀由乳房照血海候至真陰之氣發動乃行煅煉之功若此段工夫要分真假淸濁如煉假陰濁氣必成疾病醫藥罔效果然真陰發動周身如綿醉漢相似此時血海中如魚吸水一般其樂景有不可以言語形容者斯為真陰發現之真境也此景一到即用真意引過夾脊上玉枕透泥丸過雀橋下重樓入乳房而仍歸於中極血海也倘或體衰氣弱二三月之久真陰毫無動機無可如何方用作為之功先將右乳揉轉十二次後揉左乳十二次摩臍腹三十六次口中咽津液三次咽畢仍照前回光返照虛極靜篤以守之如此每日子午二時行持不怠不上一月自有動機則可採煉至真陰盡化為陽氣乳頭縮而赤龍斬變成男體則真陰煉形之功畢矣詩曰面如桃花膚似雪到此赤龍永斷絶淸靜法身本無塵功滿飛升朝玉闕丹基既成而還丹可冀赤龍一斬陰血盡化陽氣在丹田血海之中不能久住必要過關方成法身此時身熱如火氣騰如珠方用還丹之功與男子之功無異也若還至丹田祖竅方用周天煉藥之功夫玄關一竅萬神萬氣之祖也內有先天之祖氣會合凝結宜呼吸綿綿一意守之不散二氣自然交合八脈自然流通仙胎自然結成再往向上之功三年煉巳己成大還而結聖胎仙胎結成十月火候煉足嬰兒自現或聞絃歌絲竹之聲或暗室生白未來之事他人之心毫無隔滯觸景便知到此可以造就身外之身任他諸般境界不可著他不可懼他我只一心守中面壁九年候陰盡陽純形神俱妙與道合真待詔飛升永為王母之眷屬脫卻塵世之輪回矣算來不過數年辛苦竟成億萬年之快樂斯世之婦女思之又何憚而不為哉呂祖曰可笑世間學道人論天論地講修行天機妙訣都不曉三家藥物未分明不煉爐中真造化難免苦海墮沈淪我今傳你三教理説段修行妙訣功先講天文並地理天地三才要精通男子修行伏白虎女子修行斬赤龍天地周流分度數日月循還運化工五千四八歸黃道金木水火轉相逢女子原是太陰體須知太陰妙化工每日右旋十三度二日半後行一宮一月運行周天畢女子氣候亦相同要知金丹真口訣天人造化本相通會得其中真妙竅晦朔弦望仔細窮一月運周機先動兩日半後即下功若人識得天機妙何愁女功不玲瓏再有一段真金訣須共神仙仔細論七星寶劍西南挂雙林樹下運轉輪盤中寶珠夥夥現一隻白牛透崑崙百尺竿頭忙撒手騎牛趕月伴老僧又撞金鐘無影寺六月滴水化成冰沒絃琴音奏三無孔笛吹出八音木母伴作木馬走金公又隨金烏行二人翻江並倒海看看要到高峯亭灑了一點真甘露忽然七孔放光明到此一步緊一步切莫擾亂並因循待他一點來歸壺二五凝結始圓明若問此歌何人作兩口傳來度女真其中妙理悉包盡莫負我今苦叮
