front:
  text: 女丹合編女功煉已還丹圖説聖師云女子太陰先煉形初行功即要意棲乳房行住坐臥皆宜如是行至四十九日行住坐臥意守中極中極者即心之下血海之上當中虛懸一穴是也行住則宜默運天庭坐臥則宜意守中極血海如雞抱卵一念不起百想俱無但行此功真陰未動脈絡未通必多倦睡須行指腦下垂之功指腦下垂者何也即回光返照以眼觀鼻搭定雀橋下玄膺至重樓歸中極入血海以水會火片刻倦睡即醒此即調藥煉心之法如妄念一動仍守中極少年女子煉至百日不為外物所擾血海自潮真陰自動動者非身心動是血氣發潮似有不可忍之景象其樂也融融難以言語形容是由無念而自動此時切不可動念念動則散惟宜把定元神用法採取此即小藥發生須行採取之法兩三度以機息為止仍守中極採取之法以眼觀鼻過雀橋下玄膺到重樓入乳房遊中極歸血海行分水透玉枕升百會下泥丸入明堂仍降下中極而歸血海將真意守定中極血海入靜入定如其陰生再行採取之法機息仍守中極血海凡行此功須戒暴怒風寒暑濕以及生冷瓜果火煎之物此時定要撿點倘風寒入竅藥難醫治總要萬緣放下一塵不染如果照法行持一日之間真陰之氣能動二三次此動要分真偽有氣機之動有念慮之動須無念無慮無欲而自動方算真陰發動只要百零七日血盡化氣赤龍自斬變成乾體基已成矣還丹有何難哉注云女丹經多言女子行功每逢月信一到便要停功此説謬矣皆由未分淸晰誤也凡女功所重者氣機也但其中有壬癸之分如壬水初來癸未來此即信到也信到彼自知之或頭昏或腰疼信至而潮猶未至此時正宜回光返照默守乳房血海用採取之法以補腦築基則所採者壬水非癸水也如癸水一到自應停功必至三十時辰兩日半癸盡之時仍用採取之法採至何日而止其中大有天機口訣須求真師口傳心授不可妄猜如果得其傳授少年百日便可基成行功到此自有考驗赤龍自斬乳頭自縮如男子一般而真陰之氣化為真陽矣此時須要道侶同心扶持候真景到時採小藥過關小藥過關之時亦有景象果到基成藥産丹田有火珠馳驟血海如湯煎鼻搐身震切勿驚懼此處亦有口訣要待師方免危險不然恐真火變成凡火一防焚身二防顚狂如有得真師傳授者藥既入鼎便要知煉藥之法法待真師口傳若不知煉法不能結丹得者必失此藥既名小藥自宜用小周天火候小周火候亦有口訣進陽火退陰符而煅煉之符火有候亦有數煉至一月小周數足或藥之真偽丹之結否自有考驗如小丹果結每逢入室靜坐遍體火發如蒸籠之氣一般只宜默守中宫訥言不語聽其變化霎時之間見一火珠如豆大從明堂射出一丈多高如閃電一樣此乃基成得藥之真境界也斯時雖有煉藥祕法總要一念不起五藴皆空任他天翻地覆雷電震驚我只將元神穩坐中宮毫無畏懼如雞抱卵如龍護珠時當進火則進時當退符則退進火退符有候有數必煉至大大定氣足神完火珠不現小丹凝結而後已焉此係築基得藥結丹三層口訣後尤有四層天機不能一口道盡厯來仙師授受皆係如此果然功行至此人仙之果證矣以後用功與男子無異但女屬靜體後四層雖與男丹同其運用而其建功更速矣真師總批凡孀婦貞女烈婦能立定真正志節始終如一受
