front:
  text: 女丹合編西池集
  hash: sha256:a2bf4e04bd97d9851106c37d158b086265b4ec4acd7a1bf25478974a13e1d33e
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_18p001a}
body:
  text: 西池金母少女太真王夫人著孚佑帝君回春子注金溪傅金銓較訂詠性功十八首月正圓時映水明乾坤大地總瑩瑩片雁斜過潭有影移時明月映波淸回春子曰巧機適合寶相團圞月照寒潭光鋩四射惟淸乃澄惟澄乃照寂照圓通覺靈自現西來妙義至大至圓活潑𢆯微東海珠還咦四海湯湯水接天水天深處自逢源海蟾子曰喜得同人注性詩明心見性道成時劉癡來與龍華會醉向澄潭捉月遲靈陽子曰此夕欣逢巧節澄淸要在斯時月光皎潔印深池真箇天星倒置不著離奇色相豈因空境空之一靈透出巳前珠魚目應知不是長春子曰心性非一物性在心中見水月兩澄淸波光自不染靈臺深廣似澄江源遠應知流自長任爾毒龍爭戲擾豈如溝洫污泥揚回春子曰淸光如鑑不須煅煉一著揩磨毒龍便現咦沒得說西來妙義隻履仍歸磨不磷兮涅不緇寵何可羡辱何辭靜中現箇團圞月始信斯人不是癡回春子曰當頭一棒領者去會會者顚頭融通寂滅惡莫憎兮善莫誇堅持吾性漫憑他地雷震動真如現一任遨遊上海查回春子曰如何佛法乾矢一橛霹𩆝一聲不怕打殺濃雲密霧雨淒淒遮卻本來菩薩面不是淸風淨掃除蟾光怎得團圞現回春子曰蒲團片響剎那一刻翻個斤斗菩薩出現性似澄潭水心如大地平草萊生即剗風過碧波淸回春子曰性不離心心空無物草生用剗下乘之法靈明一點本淸虛雲去雲來月自如應事還同光暫晦魄生依舊現明珠回春子曰不曉參禪那知拜佛一拳打破五指不撒心如野鳥最難馴才出籠時便要擒莫使隨風任南北本來狼藉陷深坑回春子曰分明一箇月指早是個日日月光天德山河壯帝都咄誰識一點靈明一點金隨風揚去窅沈沈分明有箇菩提種性亂神昏何處尋回春子曰穿衣喫飯不知飽暖心去性空火中蓮現愁苗情種兩都捐外若春溫內鐵堅順死逆生同一理但於動靜卻非然回春子曰荆棘中不妨著腳深潭內也易翻身怕只怕淸風明月坐對靑山人生碌碌似浮萍業海風波何日停要識本來真面目勤從月下叩真人回春子曰一盂一鉢音撥到處為家撞著老參舉杖便打渾淪元氣原無象庚甲之間覺有形莫道有無難自辨須明求己勝求人回春子曰摩尼一粒沙界難敵龍女獻來此際得識咦一個孩兒兩個娘四門親家不得疏失了也外濁須知內本淸龍頭虎尾按時生若將凡聖和為一白雪黃芽自長成回春子曰如何是道要撒胞溺喫飯穿衣全不分曉大道先須養性靈靈光悟徹易歸根總然精氣神皆足黑暗如何解煉烹回春子曰東南西北及中州黑黑塵蒙易白頭咄說話的顚倒了難不難一翻斤斗易非易掙起雙眸緘口凝神只內觀法身常現一毫端靜中攝得靈明寶直置中宮便是丹回春子曰得了手閉了口若還不去承當竹箆何堪打走咄咄咄再來不值半文錢請到方丈後去休長空淸迥原無染雲去雲來只自忙鼓動巽風旋上下性光命寶總歸囊回春子曰一口布袋包藏無礙混混沌沌放不出來明暗休將世務分閒來覓得已前身惺惺不得炎凉態生死全拋得至真回春子曰九天之上九泉之下少林拳棒上下齊打打得開通任放從馬騰騰烈焰靑龍舞渺渺淸波白虎蹲虎尾龍頭縧索繫擒歸神室合真源回春子曰久別家鄉道阻且長從今得返方知父母妻子各各安好咦千年華表依然一任桑田變海
