front:
  text: 女丹合編女丹彙解
  hash: sha256:1a772f3b7a497d0072c02e438d212812e5cb702c605b49b53a7dd89315e89155
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_14p001a}
body:
  text: 無量劫佛編輯廣東月西老人述玄天上帝曰易曰乾父坤母隂陽之義昭昭可考有天地然後有男女則隂陽之道又不言而喻則是有天地之不可無男女也明矣男受乾坤之變化而成其象女亦秉乾坤之交泰而有其形凡具茲形象者皆具乾坤之氣而同列於宇宙之間耳今當慈航普渡之際寶伐不知男子之精其氣充足女子之血其氣甚微故名之曰男陽而女隂也修吾道者絶七情為本斷六欲為先則微微之氣又較於男子者多矣何也男子之心易動女子之念略靜動則而氣易泄靜則而氣易長一則易長一則易泄何啻千里之謬歟男子之七蓮易收難放女子之七蓮易放易收荷能真心不懈不待三五之歲而甘露常降七蓮常開開之易豈有採取之不易哉男女之辨於此明矣若集中之言虛言空言玄言妙言神言化又男女之大同也吾再分明而辨其真焉果仰辨乎男子則以胎名女子則不言胎而單以息名者恐後世之人錯認胎字卒受誣名鳥乎可女子之息不結則巳一結而封固再結而自守三結而穩根强此三者故所易放而易收貞女節志可不急急以悟其妙耶更道而論之女子之氣息原體本柔所不柔者後起害之也有志超塵者只戒一箇剛字常切一箇柔字苟常柔溫不息則虛也妙也空也玄也盡儲柔字包括於萬物也再者男子之神出真必至純至陽而始有脫殼之機陽中含隂也女子之神出真不同於男子之神也又何也女子造到三陽之時即可脫化百里之遙造至純老二陽之會則一出永出斷無夭折之患矣蓋男子陽中含隂女子隂中含陽男子隂在內而陽在外女子隂在外而陽在內陽勝則諸陰易退吾今不惜真脈道破於斯無非切望早成真者之多耳玄天上帝批曰可知女子之的丹乎吾所分者的的確確至他法他訣本同男子其不同者此中之竅誒也廣元佛批曰結丹神化脫胎原本虛無自然何有功用之可說乎金沙古佛曰大呼同緣細聽吾言厯年修煉卻也心䖍功難上身豈無弊端有法無法常常點穿有念無念卻也細談多犯拘泥又是那端多犯執著又是何愆皆由世俗雜於後先後乃六欲先乃靈元先後並用靈氣不翻先天之氣一線牽連三關九竅竅竅皆然一雜後起便隔玄關先天氣阻九竅不安一坐之後節節辛酸遍體拘强氣未通關一竅未到患即相纒爾等修煉誰知此番無發慈悲下細指穿以便防患莫怪上仙以法誤爾箇箇膽寒先後有氣只分寸念念本難淨須聽自然切忽拘念拘即阻關中田一氣全體聚焉仙云採取採取先天後天念絶先天自然合而為一三關充滿配合隂陽兩兩相連隂消陽長固結一團丹從此長芽從此沾今察衆生每患病纒皆屬先後未分界限吾與點出箇箇思勉未上坐時先須散淡勿拘勿京活潑自然然後上坐更無拘牽隨其念來隨自出焉隨其自化只將神全念若堆積毫不沾絆閉目思睡身化形完無人無我死尸一團如此用功病自安然更不惹病全體舒安拘念氣阻火即焚原著意氣散邪更燎然病從此起燒乾真元女子血海氣化出焉邪火一動蒸透命原血漸枯槁醫治難痊血動之時更宜舒展躁性勿發怒氣勿沾念更宜淨神更宜恬隨其紛盡始坐自然倘作躁怒觸犯中田朝夕心熱口苦舌乾皆由此起誰辨此端修煉之人絲毫勿犯箱著塵迹大壞真元爾不自覺患即來前身冷身熱皆由有偏莫謂修煉卻病延年倘不知檢患莫大焉一時一刻念念檢點勿犯勿觸易長靈丹不須期望玄而自玄不必苦功丹結九轉不必苦坐無時不禪閒居行住皆長妙丹爾等修煉心非不專後起參入先天隔斷鮮不受病何怪諸仙吾今點出細心相參一切妙法利勿割完毫髮勿差絲毫勿沾朝夕優游灑灑安閒有食無食莫𦊱心閒有作無作更勿周旋如是百日妙景自𣷹能修一載萬象自然莫拘修字煉字更兼一字不泥化如木泉始算真修始算真煉修本鋤惡煉本渾全有形加煉病自入焉無形自煉煉乃真玄今日吾臨萬象概删先防六賊亦聽自然有心而防難中之難無心而防勢必自堅牢不可破何用防間大衆婦女同心勉旃身居何等念立何願事本尋常切莫看接七頁與浩浩皆由此處發根竅以大處而論百脈皆由旡極分形造以細密而言又屬無形無象𨚫原萬化盡包到男女俱同此至寶只分血精兩條男精逆行而成仙女血直騰歸心竅故而各有各法各有各照女功雖用凝字法莫將心地緊相抱如果意馬難拴住稍著片念血海潮血海與氣海兩下有分曉血海以前只七分此處即是氣海竅竅在那不上不下不左不右一妙竅血化氣凝化氣妙後天之氣先天化一雜人欲便隔到有後無先成凡種仙凡各異須知道道在此處不算道氣必歸根旡極竅方能凝成此靈苗方能結丹火候到此點先後何以分分出火候更莫少癸水若未至勤修莫懈怠朝夕活潑兼樂好太鬆精神散太緊閉氣竅必須不鬆不緊不遲不早不住為住不好之好不凝為凝不照自照此點火候甚微微衆女雖當仔細料不識此點不算修修煉二字須忘了多以煉字太著迹一著便即病根擾此病一染著藥物難達到世人動云病根在臟腑此病根藏在髓道藥何以能除全仗純陽一點貫內竅方將此病除得了好好好吾再示一則再將火候撥幾層不與層層撥終歸含糊於不明必定受病更深沈氣之冲騰須歸竅動時不能靜始生使爾不知不覺不見不聞歸根後一動性命陰陽會水火既濟分旡極而太極略微二字須著意可也包含化渾淪上坐稍凝煉無相凝莫存有相略微住一有靜機便莫擒聽其自然而靜不可妄參一識神一切齊放下睡也由他昏沈也由他一毫莫錯驚此點火候少人識多係將靜妄動身一動氣散成魔障千千萬萬意紛紜到此時即便下榻來散步等候一刻上榻衾再行去養靜靜自易歸根若是强打坐疾病內栽根再有心多妄先睡而後用凝神無妄切莫用有妄便煉心煉字須活看微凝恍惚而杳冥方是凝煉法方是入靜第一乘此即上坐火候法動時火候要分淸動候必覺覺時莫雜塵天人此分界仙凡此處分儼像赤子體未覺先天體已覺後天生此界當細審覺時初刻猶恍惚覺初再轉萬念縈初字再字義電光一閃頃若無紛紜象正念聽氣分倘有妄想擾凝煉進一層亦是聽氣還陰陽兩下復元再遊行用此功夫當莫懈舍此一法非上乘吾今點此真妙訣男女一齊記在心不是真種真心煉輕泄天機被雷霆法雖甚淺淡細思絶妙始見精此即未得金丹時朝朝不離此法門白蓮真人曰立志貴堅貞總勿染塵氛法本平而易運行勿留停有時法當用須知勿太矜有時法當捨默守本來真動靜兩相參刻刻會天心貞女原無法不過聊點睛血氣有衰旺涵養功宜深久則血化氣白膏貫周身自然陰成陽紅塵不動心方能成乾體方能證上真稍有欺僞念猶恐墮深坑白蓮真人曰節為修行之階級貞靜無塵即初禪更加修煉養真氣陰降陽升露玄關玄關不在身外求即在寸地覓大丹心果靜神果閒活活潑潑運周天氣也歸源血也歸源細細烹煉爐中間暑也不熱冬也不寒溫溫養此真蟬娟十月丹完全三載乳哺聽自然自然飛升大羅天自然飛升大羅天金沙古佛曰女丹從何得來男與女兩不相侔女與男大相懸殊男丹由精化氣氣化神神化虛虛極靜篤而丹自結矣女丹由血化氣氣化神神化虛虛無自然而丹自成矣但氣雖由血所化卻有兩解如心不定念不潔身不𡧾氣不平則血亦不能化氣而血自為血氣不見氣則血盡成濁而信皆露矣夫信本污濁之物何以化氣蓋化氣者血而所以化氣者血中之元氣也元氣者何血為通身之精氣有此血而精氣以藏無此血而氣無歸宿血如海水水凝而氣凝冲天則雨露以降人身有血如海則血自化氣而上達遍體然後流通百脈百脈貫而一點下墜由此而丹望結矣不然滿腹俗情日外事性氣躁妄紛華牽連憂思鬱結妄念打擾終日無一𡧾靜則濁氣隔斷真氣天地不交陰陽不調寒暑不節周天不合而病有不成者百無一二此非道之咎實人之咎也吾今指點衆生各宜細心體會莫謂道不真特患爾心不真耳爾心果真掃盡浮念去盡紛華和緩性情暴戾不存解脫憂患而神恬快樂斬絶外務則天氣下降地氣上騰先天真氣自然流露充滿海水氣亦自與神氣相接不坐則已一坐而自自然然其中有無端妙趣較之人間一切別有一重天地方知道不虛而仙不假訣不誤人但要自性自悟可也吾今再下一丹有謂赤龍不斬而丹不得結道不得成者不知血盡而氣亦盡矣如男子之精敗而丹亦難成其理一也蓋男精女血多不可絶氣離血而氣無由生血化氣而精始流通如謂血盡而乃言煉丹何靑年血枯而病反起此終不離血之一考證也又言煉之數年而毫無影響非無訣也實心無靜時之故也雖在朝夕打坐十二時辰無一二時靜定即或有定不過數刻而已氣何時化神何時凝丹何時結經年纍月終成一頑人耳動云某某修真某某守節不管人間一事吾察其實卻與俗人不相遠矣又云某某既得真訣某某修煉多年而毫無一成殊不知得真妙訣者始勤終怠多年修煉者姑待苟安如此修道其誣道也實甚吾今勸爾衆生論爾之富富不敵吾論爾之貴貴難比吾論爾之衣服飲食更難比美夫吾吾且當下割盡爾等有何難捨了割不下真癡而又癡迷而又迷恐終成無緣之人也可痛也乎蓋仙佛以慈悲度世世人切勿自棄其仙佛可也吾本以普濟為心爾等幸勿自絶於吾可也普賢菩薩曰朝夕修煉望結金丹有丹之汞不煉之丹丹在身中無形無端有端非妙無端絶玄玄處丹就無玄不言有心而煉枉費心猿不煉自煉方名大丹丹本空降天地一元有形之氣不算妙詮無形之祖萬象包涵一得永得空空盤旋物之生也此處兆端物之榮也此點鼓焉物之藏也此妙為嫻有形有象乃曰後天無象無影先天之天後天生成先天兆元人之生也理本一元無象無著內藏一玄後天遮蔽玄者不玄今開妙法點化有年人誰不知後起難言一朝識神念未淸潭多參人欲少見道玄七日一復卻也甚難心多昏垢神多迷涎不皎不潔不淨不乾神氣兩傷焉能通關關且難通竅何發端竅既不發何運抽𣷹抽𣷹不運枉坐蒲團吾且重說收斂神全收乃自收卻有玄言一念偶動即便自轉出須有時考驗中田前點妙法如如動玄如如有動又如無關此如如動天地兩捐忽發如如姹女交關此點絶妙從未有言吾今細點勿輕妄傳丹經典籍每部唱言俱說如如姹女配鸞此乃全話未分界限亦未分時又未分先吾今言者再與細研如如一動先後兩沾知如如動胎有鍵關渾渾而動如如自然方明考驗神出之端知動而動猶兼後天不知忽動如如快然妙不可指樂不盡歡方曰如動大丹成焉見此妙境自無塵緣相不待掃諸念悉捐藴不著空空空自然不著空相萬境空潭天地之運我渾一團天地之靜我與一玄天地之生我與相兼天地收藏我與一元造到此處大覺始言未到此境仙成猶難何悟大覺豈輕易言吾今點化如如一翻機盡泄漏妙法無邊瑤池王母曰真女本童體只在淸濁分鉛汞雖全備奈已變成形一入胞胎後不得以真名既已落後天豈能便飛騰元氣縱圓足亦宜煉渾淪自有而返無方可言歸根若論返還理女子未知音常常執著守兩眼照乳庭淸濁難分辨混淆氣怎凝淸升而濁降一定理常聞過執氣不運濁氣反上騰淸氣即下墜如何識命靈女子無他訣活潑是要經心活氣自旺神活氣自靈意活氣自固性活氣自升活潑非在外心中不著痕心定方上坐上坐息調勻息勻身體化真樂此中生樂而忘其樂周身氣渾淪自然歸祖竅關鍵毫不存能靜一刻久一刻