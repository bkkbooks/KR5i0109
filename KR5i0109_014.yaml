勤養仙心垢化冰多貴仙根少擾俗割斷凡骨換仙身明明常照前身映星輝七斗放光明兩目靈光常生內兩耳靈氣常閉門兩鼻不為凡香引真香發動貫七星一口能杜俗粗氣行住坐臥號佛聲兩手不沾人情態多翻貝葉念諸經兩足穩住天台上丹室禪宫漫舉行步履輕搖心便蕩妄動耳目即擾神神擾心即隨機出散漫無歸氣何勻內吸不勻外氣擾內外一吸自歸根內主不搖神自穩搖動不寧氣難盈即或有動真機轉困頓無歸擾黃庭呼吸一勻先天動後天自讓先天行若能念死後天絶先天自從左右生此機本是自然來並無功用訣點明吾今指盡無上妙望爾凡胎照去行同守真志休貪訣點爾關竅堅爾心爾志能對吾之志爾心難似吾心淸能比吾心淸如水三載以後吾親臨現身度爾童貞體平空形飛走如雲吾形常在爾心內爾心即是吾觀音觀音菩薩常常在功成果結伴吾身七蓮能化千萬朵千萬蓮花覆爾身此種捷徑都不去還在何處拜世尊金沙古佛曰吾今無他法將收心之上品掃念之絶妙一一與爾指的端心意走不是別一件未將大道細嚼參試想這身居紅塵如在苦海一般今生落人道來生失落苦不堪俗言一失人身萬劫難幸爾等今有緣得聞大道身坐蒲團心也不須收意也不須觀念也不須掃猿也不須拴有身如無身心似無欄關也不必觀爾的心也不必記爾的法言略取一意在乳間一刻心不定一刻莫拋散二三心不純二三莫放閒卻又不可緊緊拴也只在有意無意之間太緊氣必滯不注意念偏吾再有一法亦是收心上妙丹常在誦經典念雜默念經一遍只得一二刻覺恍惚念自捐自自然然功滿百日見先天一坐遇睡魔醒時即參禪志淸不用收念起再用此法收妄念實在難實在難實在難將爾等牽纒斬斷不盡紅紅緑緑花花衣衫斬不絶南田北地兒媳情腸一大串縱是仙佛手段也難度爾上仙苑也難攜爾上吾船勸爾等莫在退卻自將金丹拋入那孽海無邊生時不知悔死後方了然再醒童貞女各自細打算前生之根本非淺今生遇奇緣並無人牽引一聽大道闡妙玄一個個自已心願看破了紅塵世界了脫這七情不沾真乃是千古希罕果算得女中奇男但只是眼為六賊主見不得紅紅緑緑花花朵朵披好看一念便打轉事事愛體面虛假人情費真念吾今勸爾休沾染莫憂這事難結果莫𦊱這大緣難滿願又莫慮普陀無人喚爾能了脫人間諸掛絆自自然然有金童和玉女時刻來經管不使爾道氣被魔擾不使爾道法被妖纒一直悟到頭勿沾勿染身也輕體也便百病不生樂無邊即至功滿日寶蓋和幢幡護法韋䭾前引路十八羅漢把駕參花仙彩女千千萬四面擁護到西天爾貞女試看好也不好真真是前根不亞緣法賽天仙苦口良言切戒汝惟冀個個記心間圓明道姆曰圓明氣本圓氣原藏一穴一穴分九竅東西並南北星象列宿位以一為轉折不睹亦不聞似有似無別有無歸中候煌煌輝四廓此穴不多大萬象盡包括大如天邊外小配形難測高而三天上卑又海底徹穴道分明點人皆聽淸白今非重重點精微難透徹不陰亦不陽陽精媾陰血陰氣歸血海陽精此發泄發動人不覺恍惚心甚悅飄飄而蕩蕩淸濁分皂白不樂心焦悶陰陽兩不接一得神飄渺氣包無阻隔子午蓮方吐陰陽兩交叶陰合陽祖氣蓮蕊遍池列陽配陰祖氣花開茂枝葉此處一花放七朵盡行泄血海通祖氣祖氣又歸血血枯氣必阻氣阻血自竭阻竭病何起皆因氣鬱結鬱結又何來拘滯不灑悅因心不脫落先後氣關閉閉是下阻上塞是憑空說因閉血不動不動乃阻塞氣阻關自閉一線不通坼血氣有淸濁淸濁何分別心淸無私妄呼吸亦皎潔皎潔合真陰真陽自交迫淸濁自然分信不失一月輕淸而上浮濁自下漏泄心雜氣必燥呼吸亦猛烈燥與陽相交邪火發如鐵便燒真陽氣乾枯病易得世醫如盲瞽診脈藥妄切先將氣血補通關毫不涉一旦濁氣凝經絡更閉塞及至心病起煩燥又發熱口乾並舌焦食冷暫救烈醫術更恍惚問症再分別一聞熱症起凉藥用知柏先補而後冷痼疾了不得服盡百草物形容漸瘦白及至莫奈何參茸加歸鱉滋陰又培陽頭緒更亂擇修真受害纍個個怕悟得不修猶快暢修來反受折吾今明告戒血停有規額血如山谷水浸流督不得一督亂竄發反觸正脈穴不得不遍流甚至冲過格人身血海內只有三條脈氣海與血海任督總一穴精從此處過濁自此處泄若非寒冷滯必不至阻塞塞而不順流通路把藥切須溫休太燥分淸濁自別如是治此病妙手稱上客吾今與點破以免受𡨚孽分配陰陽路男女指一節男有此祖氣分配在精穴女之祖氣合陰從血海說男有此陽關順逆不須惑女有北海地波搖似水迫大周天大動小周天亦闊十二時辰候子午二極接此點有分解有修未坐宅修者子午合真氣真媾結未修仍交會真祖氣難泄此處真命的勿輕妄與說北海有淸濁濁者氣淡泊濁乃形質露是日念掃絶念淨淸浮上與祖氣相接念雜氣入質淸反歸濁𣶋月信多差錯即是念太墄念墄神自昏神昏莫分別淸濁兩混雜真氣不上拍果常如是樣如是病發脈必得是日到不想妄自滅優游無稍滯灑灑而貝葉貝葉不慮亦不愁不驚亦不嚇不張亦不大皎皎而潔潔行住無𦊱礙惺惺而悅悅不識亦不知聞聽念不涉形骸似飄蕩天光而地白手足如輕撓浮動不沾擳最忌心太猛念恐功有缺此念是大病快快治宜切三七露未盡牀褥莫拘節聽其露盡時上牀方合格此乃一定法非人休傳訣天地之精英此處一旦泄再望爾婦女心中莫記訣無訣道難明執訣氣有隔平居心與口多把佛號默有念方默著無念不必默只將人事了手莫探花蝶不過衣鞋制常探內功烈手作人間事念冷如氷鐵眼為搖必賊莫著花影色此乃俗骨纍爾願立修德修德與修真修性修心慝修慝德自新一朝氣蒸耶超身雲霄外飄飄臥極北吾駕鳳凰輦金花仙女接引爾遊上界攜爾到佛國仙塔登幾層眼觀大千陌紅塵勞苦輩俗胎甚慘烈南天一觀望代為淚垂帛縱是大慈悲難將無緣惻即是大願船莫渡自作孽西天大佛祖萬法總難潔吾本圓明祖降臨於此宅分分明明點望爾心甚切莫忘諄諄告朝夕靜是訣欲多來擾由於眼招賊眼見如未見反觀思內穴不輕亦不重不急又不歇不燥亦不妄千般亦不迫不沾亦不脫百感概消滅不樂自然樂不絶自然絶上坐休用意死尸恍默默天崩爾不崩地裂爾不裂人言休動氣自取自明白淸福與紅福觀紅如視黑靑白分真僞人雜類各別我無金剛體妄遊極樂國長短莫計較不聽自除耶高超世幾等不與俗同格志大言勿大心真念莫怯常常體仙佛在此談玄訣婦女書少讀性理更難得只守一念淨絲毫內莫塞如光天化日如星又似月如北極之亮七星掛天闕明明而朗朗昭昭無點黑爾心明似斗內七星燦𤐌皂雲雖遮蔽本體仍不絶雲過星猶朗爾心如星炟心中無一塵有塵心走別心本原無妄因見妄入宅心本無他想耳聽便遭厄心本無沾滯因身不便捷身口不合意便動怒不悅有此一怒態五臟火發越此根不除盡枉把道修也吾今下細點貪字宜割截衣食固莫貪自然有湊者善念亦莫貪仙凡念上別妙法亦莫貪守靜妙莫測功夫亦莫貪隨時快坐攝妙境亦莫貪境象無形色安安而樂樂歡歡而悅悅瀟瀟而灑灑悠悠而闊闊即是妙景象此象貪不得由他自來去由他自然結由他自變化由他自交接念靜神不擾二三載必得吾今大慈悲逐一告知者爾婦女等輩莫拘是妙訣一拘即成病莫怪道誑惑內外皆莫捆神活氣超越遊行念淸朗心自皎而潔來往又何拘天高月有缺人生難滿願到頭知紅黑此時風氣薄人言聽不得各修各性體仙凡有分別仙原仙根來凡本前生孽今生雖富貴身謝甚可怯不帶有功善罪過注黑册一生無善折銀錢空手撇只帶一身罪塵埃膝屈血罰入大地獄來生作聾瞎仙凡此分界修煉又有說縱難成上品仙佛代解厄養性閣中修功滿朝上闕修真丹滿足佛旨下仙帖金童執寶幡玉簫天地徹迎爾歸極樂永享千萬劫不入輪回道不生亦不滅不死亦不老長生榜上客時而烟霞伴時而鳳閣歇時而天涯轉時而海島閲觀不完金剛美景看不盡琉璃彩色這才是功行圓滿大快樂這就是修道歸根的大妙訣
