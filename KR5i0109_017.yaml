body:
  text: 女丹合編西池集序蓋聞乾健統天坤順得主資生之道含二氣以絪緼交泰之和統三才而埏埴德言工貌坤道云全淑愼溫柔閫儀斯著至於夙鍾靈氣生具慧姿錦織回文猶受連波之憎豔霾同埋靑冢空歸夜月之魂其他霧鬢雲鬟沉迷苦海啼香怨粉填入火坑五漏形骸本是前生業障三因不悟又增今世寃愆其間修短窮通不能枚舉妍嗤愚智何可勝言總因世乏坤傳致使人難超劫是以奏請太上敕命羣真闡心性於詩篇寄棒喝於轉語既知寂靜恐墮頑空更有真傳教渠下手言言玉液無非修身立命之功字字金針盡是縛虎牽龍之訣果能誠心煅煉眼前即是𢆯洲依法修持鼎內便凝絳雪與其牽纒世網戀茲一息繁華何如斬斷情關占卻萬年道域西池有路度楫在茲聊綴巵言用申木鐸重陽子謹序
