front:
  text: 女丹合編女丹合編總目
  hash: sha256:388370987cf2b897974f6ba1873ab713b0f8e96112a00ae61ae59511da887afe
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_03p008a}
body:
  text: 井研賀龍驤纂輯新津彭瀚然參訂成都二仙菴住持𨶒永和恭校坤元經一卷孫不二元君撰入坤緣覺路坤訣一卷孫不二元君撰女修程途一卷孫不二元君撰一收心二養炁三行功四斬龍五養丹六胎息七符火八接藥九煉神十服食十一辟穀十二面壁十三出神十四冲舉壺天性果女丹十則一卷華藏山淸列古佛撰第一則養眞化炁第二則九轉煉形第三則運用火符第四則默運胎息第五則廣立功行第六則志堅行持附規戒六條第七則調養元神第八則移神出殻第九則待度飛昇第十則了道成眞女金丹二卷用中貞一子撰上卷規戒立志入道入門規戒十二條一戒妄念迭生二戒縱慾貪淫三戒剛暴殘刻四戒煩惱嗔怒五戒憂思驚恐六戒目多妄視七戒耳多妄聽八戒口多妄言九戒慳吝惜財十戒殺生害命十一戒不節腥葷十二戒慢道輕師下卷口訣收心養性養氣凝神三命氣穴知時斬龍形隱求丹煉巳順逆丹生採藥升元合丹火候温養胎息度數脫胎乳哺面壁冲舉樵陽經女工修煉一卷吕祖傳坤甯經一卷入坤緣覺路資生章第一氣化章第二凈業章第三思過章第四修善章第五崇德章第六誠孝章第七節烈章第八女教章第九婦道章第十經論章第十一覺迷章第十二坤基章第十三根本章第十四性命章第十五心體章第十六說靜章第十七指玄章第十八金丹章第十九玉斗章第二十實證章第二十一圓通章第二十二奉神章第三十三廣願章第二十四女工煉已還丹圖說一卷二峩山人述女丹撮要一卷傅金銓輯女丹彙解一卷廣東月西老人述女眞丹訣一卷蒲陽無心子陳永淸著太陰煉形秘訣三斬赤龍秘訣女子修眞秘訣女丹要言一卷純陽吕祖傳西池集一卷西池金母少女大眞王夫人著囘春子註咏性功詩十八首女丹詩集二篇傅全銓輯前篇吳采鸞仙姑三首樊雲翹仙姑六首月華君崔少玄六首唐廣眞眞人四首玄靜㪚人周元君五首後篇七絶十八首九品蓮華經一卷附入坤元覺路養性修眞第一品先天後天第二品直指玄關第三品陰交藏經第四品築基煉己第五品性命雙修第六品五氣朝元第七品三花聚頂第八品養胎調神第九品
