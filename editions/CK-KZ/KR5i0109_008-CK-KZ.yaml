front:
  text: 女丹合編女金丹序大道不問男女皆能有成故男子道成爲眞人女子道成爲元君自來丹經言男子修煉之功至詳且悉女子修煉之道多不論及間有論及此者不過略露一班非薄女修也推其意以爲人同此性命卽同一功夫言男修而女子之功不煩言解矣不知男子外陽内陰女子外陰内陽秉性不同形骸各別雖同一性命其行持大有不同者修眞辨難曰男子下手以煉氣爲要女子下手以煉形爲要許祖曰男子修成不漏精女子修成不漏經其初關迴然各別至煉已得藥還丹温養結胎出神諸事雖與男子同而細微節次未嘗不無大同小異之殊壬辰春適有坤女問道僕敎以多看古書證其所授而丹經言女修者獨少難以考證異同爰不恤洩漏天機之罪因將其所以同者何如所以異者何如並逐節次第何如形於楮墨以爲問津程途俾得尋文釋義不致魚目以混珠深知力行庶幾金鼎可烹汞以成無上至道而方諸瑤池之會不難與男仙同謁木公共拜金母矣
  hash: sha256:614554e5bf7262becbfb9d777f81b4d6230579f20e03759b3002a7de8d645cda
  markers:
