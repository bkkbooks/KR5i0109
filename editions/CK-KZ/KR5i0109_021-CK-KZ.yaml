front:
  text: 女丹合編女丹詩集後編
  hash: sha256:fd6d088c4a72a55c868dd48ef76ceda805a9fdcea934716a5ef933aa9fe37b15
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_21p001a}
body:
  text: 黔中積善堂述白蓮眞人男女金丹地不同男子所觀之地與女子所觀之地初功本不同陰陽一理實相通男女都要煉成純陽其實理一而已淸心寡慾爲根本築基先要斬赤龍赤龍月信也煉去煉來月信不潮兩乳自縮如男子縮龜一般則丹基始成生來本靜靜中求女子生來其性本靜卽於靜中煉丹成功較男子更速一味薰蒸補破舟血變爲氣潮絕信女子多血用法盡變爲氣而月信可絕先天一復上瀛洲復其初來之性卽可成仙成佛情竇開時如破瓜天癸水至如破瓜然全憑土德長黃芽芽生五土之中故曰黃芽朝朝暮暮勤培養自得長生不老花由黃芽而勤養之不使戕敗漸漸開花卽能超劫運爲長生之本香逸靈眞佛身中有一白雀觀指乳房也使紅變爲白故以白雀觀比之要學觀音把法煉昔觀音聖母在白雀寺中煉法卒成大道有朝功成朝王母大眾同飲蟠桃宴望人同登彼岸普渡婆心也全貞一畫佛婦女忙將紅塵淡阿彌陀佛心中念常念四字經卽是拴心之法不離黃姑同坐臥時守眞意功可速成凡胎自脫仙骨換有如此好處怎不學習无極眞人未死學死終不死人雖未死猶如死人一般所以終得不死逢生殺生永不生心有生時卽以慧劍殺之所以終致不生不死不生眞入妙湼槃一證大功成形不死心不生可證湼槃上果功何大哉右眞一古母敬註慈悲古母迴光返照兩乳間修神注在金鎖前眼觀兩乳之中神注兩腎之下自然河車運至中田以補破體二日半後黃變白行經過後計二日半血變成黃斯時淨心用功不久變白而赤脈斬猶是處子體矣移鼎換爐煉成仙赤龍已斬行法之地不同得訣煉之可成靈眞太化佛慈悲爲本心是婆在家出家養太和在家婦女出家尼僧道姑俱可脩煉總要以慈悲爲本人人都有菩提樹長坐菩提登大羅能知菩提樹在何處卽在菩提樹上用功久之必成菩提矣靑雲眞人藥在火中煉藥炁也火神也卽是神馭炁火在藥中現神因炁而愈靈有火無藥煮空鐺不可弄火有藥無火終消㪚不可無火火藥二物能適宜金丹一結入閬苑神炁相依焉有不成之理光明大慈眞人幽閒貞靜養性情婦道克全德匪輕上句養性下句培德卽是内外交脩功夫乳房血海常留意下手初功將形收斂合太陰太陰斂形法其乳縮如男子彩雲琉璃仙最好惟有六字經卽南無阿彌陀佛從前轉後住到心念佛之法臍前念南陽關念無陰腎念阿泥丸念彌咽喉念陀終將佛字住在心裏又可收心又可平氣其中暗寓河車法時刻照此法念之盡將後天陽氣車入中田自能補足先天不知不覺煉成眞此法簡易婦女可念男子亦可念總要行之久遠其效愈大靈全古母懷抱兩個如意圖此圖所以護心亦所以通心生來卽有人人俱不分男女人人皆有問人果能如意否如意中蓋有如來果能如意自有無窮佳境見於胸懷果能如意上天都不負如意圖之名自得如意圖之實飛昇指日可俟大慈純眞佛動靜不可離這箇離了這箇路便錯這箇眞意也時時誠意先天自復若意念一差便非正路坤陰變作乾陽體女性本陰變爲乾陽方能輕身頂天立地莫柔懦陰性多柔要有頂天立地志向庶於道有望无極瓊眞人一入空門萬事休紅塵何故𦊱心頭世之尼僧道姑已入空門矣心猶不忘夫紅塵者何故金沙古佛規模在靜坐參禪曷效尤金沙古佛觀音大士也何不學之以成正覺此言出冢者宜急脩覺世界佛可憐最是未亡人凡夫死者謂之未亡人矢志冰霜實苦辛夫死守節凜如冰霜不知受了許多辛苦堅貞卽是仙佛種急脩急煉出風塵女仙女佛盡是堅貞爲本旣爲節婦卽仙佛種子矣還在風塵中何益此言節婦宜急脩明淨佛王母選取重女眞色卽是空見分明大有夙根者見得色卽是空空卽是色脩成女眞故王母特優重之渾淪元氣無虧損不必補漏得法一煉功便成得了先天之法一煉卽成言甚易也此言女童宜急脩慈仁鑒善佛莫謂家事紛難絕坤維正氣脩卽得婦女皆有坤維正氣莫因家事紛紜遂躭誤一生也從無入有養神胎下田不結中田結結於下田者是凡胎結於中田者是神胎神胎是自已神炁所凝不因外來故謂之從無入有此言在家婦女宜急修億萬化劫靈全古母四大名山多女仙半孝半節半參禪有以孝成者有以節成者有以參禪成者途雖異而歸則同總以心性爲根本功圓行滿駕玉蓮心性二字脩丹之本男女都離不得此首總結女丹經右白蓮眞人部下玉女註
