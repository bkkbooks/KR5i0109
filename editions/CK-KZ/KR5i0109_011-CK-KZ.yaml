front:
  text: 女丹合編樵陽經女工脩煉
  hash: sha256:846a4ea8062f8fb96c8aaa6c8d4ea41aa2f1a0def0985af725e3cf719acee858
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_11p001a}
body:
  text: 純陽呂祖傳濟一子傅金銓述太陰煉形與男子修煉之法大同小異初功下手閉目存神大休歇一場使心靜息調而後凝神入於氣穴在兩乳間心窩上將兩手交乂捧乳輕輕揉摩二十遍將氣自下丹田微微吸起三十六口仍用手捧乳返照調息久久自然眞氣往來一開一闔養成鄞鄂神氣充足眞陽自旺其經水自絕乳如男子是謂斬赤龍如此久久行持後不必捧乳吸氣只凝神於炁穴迴光返照是謂𢆯牝之門也眞息悠悠虛極靜篤陽炁薰蒸河車運轉萬朶紫雲籠玉宇千條血脈貫泥丸自覺一點靈光不内不外自下田上昇絳宮泥丸下重樓歸於金胎神室迴光凝神眞息住於中宮鼎内是神入室矣是爲𢆯牝是爲胎仙卽一點落黃庭也其後十月功夫陽神出現粉碎虛空一路脩眞與男子同無彼此之別也
  hash: sha256:8cfd00a9fd3b9ba9381d18858e1c328c177e601f63b94045d102b37d33b0956a
