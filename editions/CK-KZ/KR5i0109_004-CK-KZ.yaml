front:
  text: 女丹合編
  hash: sha256:e9c048065f0c7e26517548c1a4505a0250e10695db9178aff170637258888c19
body:
  text: 旁門錄一卷黔中人述男女丹工異同辨一卷顏澤寰集桉此編皆女子金煉也若玉煉之要詳西玉母寶神起居經道藏輯已刻編中女修程途卽孫元君法語之坤道工夫次第也考法語尙有女工内丹一卷丹道秘書三卷内列玉淸胎元内養眞經玉淸無上内景眞經大道守一寶章附范陽盧陲眞始傳崔少玄守一詩但皆上乘大道於初工訣竅未露故未選刻然女到出神之後亦宜參看方可超脫也編中附旁門錄恐女初入門誤入其中也附九品蓮華經恐女斬龍後不知前程也女能多購書者眼界大法力亦大否則專習此編亦足證果井研賀龍驤又跋男女丹工異同辨序澤寰少孤母守節乏嗣撫未遂膝下惟姊妹三人未幾二妹殤三妹亦字人待嫁澤寰不忍母之孀居寂苦也立志守貞奉母誓不出閣年十二卽隨母持齋互以勸善歌文自娛每羡善書中言修行之美仙佛之貴憾無明師指點訣竅復無丹經印證身心默叩天緣幾厯十載忽值庚子夏京都之變奉母預避峩山始知佛門中言女修者有摩耶夫人經摩登伽女經寄孤長者女經比丘尼傳善女人傳海南一勺編嗣又得摩尼燭坤集一部約七十餘種係如山之夫人名善一優㜑姨者所集也但釋藏深邃詳性畧命非初機所能應手若夫玄門中言女丹者往往附諸道藏中無次序無專書望海汪洋無任於邑不揣陋劣割裂聖經彚集女丹約百餘紙與母演說一消寂悶一勵潛修承歡之餘又尊母命於所集女丹中提出男女異同之處叧抄一册約五千餘言顏曰男女丹工異同辨置諸座右以免工法混淆身羅奇疾牙嚖之誚知不免焉若工同好則吾豈敢時光緒癸卯春竹陽女史顏澤寰晏淸自記
