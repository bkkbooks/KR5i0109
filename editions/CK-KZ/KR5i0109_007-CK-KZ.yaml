front:
  text: 女丹合編女丹十則
  hash: sha256:a95bf7d85799eef0c437f0149fedea0b21dff3f778c9c2dc2e285417eb3db025
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_07p001a}
body:
  text: 華藏山淸烈古佛著第一則養眞化氣凡男子修行皆從初工運煉築基起手若是女子修行與男子不同男子陽從下洩女子陽從上升男子體剛女子體柔男子用丹田陽精常常保守不致外洩積之旣久用火煅煉使精化爲氣氣化爲神神化爲虛由漸而進工完了道飛昇若女子則不同女子乃是陰濁之體血液之軀用乳房靈脂變化氣質久久運煉自然赤反爲白血化爲氣血旣化氣仍用火符煅煉亦能氣反純陽了道歸眞女子初工先煉形質後煉本元不似男子之工先煉本元後煉形質其體各殊其工自異若不分門立教何以能造化陰陽男女共濟也吾於往昔詣師前問道時便請女子行修工課師言至矣哉汝之心有濟世之心也吾當與爾言明後日好度世上男女因此蒙師逐一講明女道口訣吾今業已了脫塵凡救世之心未嘗抛置故將師授口訣錄之編後以開後世誠念女子了俗道姑同登彼岸共出迷津上可以報師尊之遺意下可以救孽海之女流耳何以謂之養眞大凡女子之性必剛女子之意必雜女子之情易漓女子之氣易動種種塵心難於制伏其體烏可長存其工焉能有濟故起手之工貴在養眞這眞者不是眞實之眞不是眞偽之眞女子之心原是易動易滅若是教他長守於内便生煩厭煩厭一生諸念皆起似此何能進道故起手先教他一箇養眞之法自然煩厭少釋四體安和方能進步這眞字之義乃是有形有象之法大凡女子修持定要教他念念歸眞方爲了當如何又是有形有象之法女子之工先煉形質形質工完赤龍變化那時方纔是陰返爲陽血化爲氣從此逆修方可還丹這有形有象之法者上丹坐煉之時或平日行持之際用氣機運動從丹田血海之中運動氣機照着心内神室之地覺有靑氣一縷自血海而出定久之際其氣必動隨其氣機鼓舞自然向上飛騰衝上泥丸復轉下降斯時微以意引之隨着氣機從泥丸降下重樓此時切不可用意恐傷形體卽隨氣機自重樓下至兩乳間内有空穴凝聚良久若有動機照前行持行之不過四五十日之間其氣已透血化爲氣赤反爲白斯時丹元已露道心已誠若能堅持靜守再求上進苟能朝夕不懈時刻用工何患大丹不結女仙不成者哉此乃女子第一步工課錄之編首以教後世女子若能將此段工夫行到那極玄極妙的地位以後工夫皆從此有進也女修之子士宜加勉焉第二則九轉煉形夫形者天地之所生父母之所養稟五行之氣而成感陰陽之變而產未受此身先具此形是形之與性命相生相感而有得焉然形旣爲我有何必用煉女子之體原屬陰濁不若男子之體實秉陽剛苟不陶煉不能使血還爲氣如何孕得出先天產得出眞氣若不得眞氣仍然一片純陰又焉能復得了還丹成得了大道故女子之形是必先煉而後可然煉形者是調攝之義也血液屬陰實重濁凝居於下藏於血海胞裏化於五藴山頭灌溉一身榮養百脈循環不已遊溢諸經變爲渣滓之物去而不用直待二百四十刻漏三十時辰已週那時鎔華復露先天化形留爲生人之用此卽所謂氣之淸者上升於乳氣之濁者下流爲瘀生人生仙之機實分於此故女子之修煉預先認定淸濁方能煉得眞形夫形何以煉當其坐時用神機運動候口中液滿微潄數遍俟其淸澄然後用鼻引淸氣隨同玉液嘓然咽下重樓入於心舍下降黃房至關元血海而止略凝一凝從血海運至尾閭升上夾脊透頂門逕入泥丸仍從泥丸復行下降至兩乳間而止停聚良久使津化爲氣是爲一轉如是者三三轉旣畢方用兩手運兩乳迴轉三十六轉畢以兩手捧至中間輕輕運至血海而止仍又依前運煉一番三轉三番共得九轉煉形倘女子沈濳莊重根深器厚者行之不過百日而形已煉成長生有路矣從此往上再進大丹可期獨憐閨閫女子孽海佳人不得親覯正傳以修無上眞正之道勸諭後世女子早求師授共證菩提可耳第三則運用火符女眞之道原與男子之工大不相同男子之道貴在養精女子之道貴在煉形藥是以前段工夫逐一講明果能旦夕行之䖍心進步使身中五臟之血皆返爲氣自然化生若眞氣濳生將陰濁之體變爲純陽工夫至此方能用火行符纔與男子同等若不分門別類其工焉能有濟故男子先煉藥後煉形女子先煉形後煉藥因其體相攸分故前後工夫差別吾今立法教人不得不分明指示方使學者無虧學道女子照依前段口訣用心行持若行到丹田血海之中氣機温煖自然有淸氣一縷上冲心舍直至兩乳此時切不可動念仍前依舊行工運轉他自然復行下降仍舊歸於血海斯時氣機已動眞氣已生赤血之陰變爲白氣之陽若不用火行符其氣仍然化爲赤血白者復變爲紅枉費工夫到此時當用眞火以煉之又用眞符以應之符到火足其氣必凝當此氣凝之候別有景象倘不分明講出恐用火過當用符差錯必定有壞丹元修眞至此宜細心熟記毋自忘失若此刻工夫有悞不惟前工枉費後工難修而且有傷身命防有血崩之患終難治療學者當記淸楚然其景象何等相似當其氣歸血海時此氣是血化成並非是血故血海不相應如人出外變相歸家卽家人婦子皆不能識認安能如前日之相投血旣化氣與血不相類仍是不相投故其下降血海時血海之中必如魚吸水一般斯時四肢若醉身體難容如夫婦交媾相似莫能禁止到此地位必須拏定主宰切忌不可放縱一念凝守中宫停聚良久他自然向上冲關升入泥丸化爲玉液以意引下重樓還至兩乳間而止用凝氣之法以混合之使其聚而不㪚久久行之自能達本還元以通胎息若胎息一通則仙道可計日而至女眞修煉之者當共勉之第四則默運胎息女丹修法其理原本不繁當其運煉亦自不雜諸丹經内不傳女子修煉者多何以不傳女流蓋因其未能男女雙度故也吾今垂法教人實願男女雙度故此於丹書後編接列女道十則以渡有緣之輩何以女丹之道至簡不繁女子之性純全女子之身安靖但得一點工夫便能徹底造就不似男子之念頗多偏僻故其身心所向不同其工亦當淺顯發明行持之際原有順逆之分女眞修士果能照前口訣盡心行持自然眞氣日生眞氣旣生血化爲液其液自兩乳中間流通百脈潤澤周身此液是血化成常用身中玉乳以養之始能鎭靜中田以爲超生之本玉乳者是身中呼吸之氣也呼吸由中而生亦由中而定倘得玉液歸根故用此氣以凝之其液方無走失可倚此而結成還丹呼吸者是運煉之呼吸非口鼻之呼吸也運煉之時其勢不著於口鼻而實不離於口鼻雖有呼吸之名實無呼吸之相何也是借呼吸以爲呼吸之義也何以云是借用呼吸口鼻之呼吸由先天之呼吸而生此時是用先天不用後天故先天之呼吸有名無形隨後天口鼻之呼吸一出一入自然升降若女工運煉亦只用中宮内運呼吸隨着口鼻之呼吸而行出入自由無礙無滯久久行之自然息息歸根呼吸之氣覺得不由於口鼻一般行持一月胎息已成胎息若成女仙不難造就女子修此宜當盡心此段工夫極細極微女子修行至此步工夫必待前工養純性情煉熟方可行此若不純熟必得奇病爲害不小女子修此當自謹省第五則廣立功行女子修行原本屬至靜之理靜而生陽方謂之動一動一靜皆由内之所養非屬外面事也雖然靜養一身尙屬至眞妙道只守靜而無外行帮扶靜何能久若女子果能濳修至道已經產得先天復行煉得玉液又兼保得住胎息初工至此已過半矣雖然工夫業已小成必假外行以培養之方纔内無所虧外有所補内外兼成仙道可期當其外行如何行法女子之身常居内室終日閨閫未嘗出外如何行得了功行這等看來是外行定不能立了然亦有不須出外而可立功立行者譬如翁姑在堂朝夕孝敬視膳問寢善事翁姑此便是第一大功第一大行果能盡心竭力而爲之則仙女便可立地成就凡與人應接當存忠厚之心切勿瞞心昧已若見苦貧孤老當存憐憫矜恤之心必須損已待人竈前毋厭穢厨下勿高聲供俸神明尊敬師長謙恭長幼和恤鄕鄰舉動勿輕浮言語勿暴慢與夫一切舉動行爲在在皆歸理法之中久久行之自然氣質冲和行動賅理不求功而功修不思行而行立平心處事常在道中行到那極則的地位雖天上之仙卿卻是人間之雅婦苟能若此行何及焉凡屬女流常存内守切不可出外迎神拜佛假托行修似此所行終屬鬼眷如何超得過生死了得脫性命成聖眞於高上者耶女眞修士宜自勉旃此則雖屬外行實爲女子修行莫先於此一着若先行得此則工夫前進不難至矣第六則志堅行持女眞之士若能覓得明師求得口訣又能立得品行䖍心進道立志濳修恆久不怠可謂得訣之眞修身之要誠如是也然女子之性易漓易變間有不如意之事或有不投心之行定然自失其性必爲歧途所引終不能立志前行以期了道倘存偏僻之見此道遂不能行了辜負一生前工枉費可憐九泉之下没盡許多紅粉骷髏枉死城中藏卻無邊閨閣雅秀那時始知身不自由造物每多遺憾孽海翻騰輪迴無盡要想出頭怕莫日子了吾嘗每至冥司觀見此等男女無不悲憫蓋因世上遇道者寡求道者難往往有眞心之女而不得眞傳實授以致昧死昧生無有出期良可嘆矣吾今立法教人故於女丹口訣顯明指示願彼有緣之輩苟能遇此頓悟迷津得登彼岸使那夜台無叫苦之聲閨房得返魂之旨長守不失享樂無窮雖然此舉口訣易得人心難齊若是眞心女流得授至眞妙道便能長一而修終無悔念志向純一不爲歧途所惑更兼道心永久自可造就出塵之相若彼奇忒之婦口是而心非前行而後悖不慎言語妄與女友而示奇懷不守師盟輒以矢口而泄妙道言行相違居心苟且假借修行而望長生德寡行微而期體健如此之人是孽海中之物耳生受五苦之厄死遭陰律之刑吾門不度此輩耳日後有緣廣度之時定宜詳審方可示授若是眞修女流一心守吾門淸規行吾門口訣日夕不懈旦暮施工自始至終總要廣務行持工夫行滿那時言淸行實身强體健正氣充溢返老還童從此進修成仙可冀切不可有乖道念自將本體喪失了吾有規戒女眞記之戒規列后第一戒要孝養翁姑若無翁姑凡族親以及尊長於我者皆宜謙恭盡道敬老尊賢第二戒要端方正直凡行動舉止以及服飾衣物官從樸實莊重毋致奢華第三戒要謹愼言語凡應接上下宜小心說話以及他人是非彼此議論並師授妙諦皆宜忍口恐生嫌言致禍第四戒要小心行持凡坐煉工夫宜居淨處倘在穢側路傍以及浸濕喧𠿷之地大宜避忌第五戒要尊師重道凡遇高明請教必當謙受毋致謗語崇興矢口相對自高自恃不能受益第六戒要立志存心凡進道修行必誓以終身或期以數世毋失堅心苦志有悞前程以上六戒誠爲女子修行要道着實工夫倘不從此規戒當逐出門外任他自棄可矣姑錄於此女眞鑑觀第七則調養元神女子之工比男子便捷些女丹從養眞至胎息其工已得三分之二不若男子之工便有許多作用方能到得調神地步所以女道丹書從養眞直至胎息工畢便接錄外行工修俟其外行有餘方可煉調神一段事體夫神何以調因其前日運煉氣血時已將血化爲氣氣因血住其氣便化神了到此時候若不陶冶性情輔立外行恐將來凝之不住反失丹道有悞前工故行修到此必須使他照依戒規嚴遵法度將他心性磨煉成一塊頑石相似必須煉而復煉磨而復磨直至養道心花開發本體光明到此時候性已養純神已入定内外貞白表裏玲瓏此誠所謂萬傾冰壺光射目一輪明月映深潭纖塵不染體相皆空行到此地若運煉之時自有一番淸靈善化之機照映在腔子𥚃定久之際渾然若死人一般不動亦不言不食亦不飢此時必須用人扶養不可因其入定便妄驚叫喊若妄驚動恐傷神體必走入魔營爲害不淺也女修至此當留心着意毋致差失當其入定之後只見他氣息不存顏色不改任其自聚自散或一二日或五七日或十餘日皆不可動須當用人日夜護持待等他鼻息微微神光半露方可低聲呼之倘彼出定之後卽凡飲食衣服隨心所適以後必須着着防危庶免丹元有失此後工夫直至養到出神之後方無危險學者記之愼之勿忽第八則移神出殻女子之道原從陰返爲陽陽極而神全丹工至此長守不懈使那神體煉而復煉存而復存直煉至身若冰壺神如秋水然亦不可使之久留身中如爪熟自落神圓則遷若不遷神移出身外終爲守屍之鬼何足爲異此時當用出神之法將神移出身外倘出之速恐神迷無所歸復將所出之神復轉身内一出一入由近及遠切記不可放縱調教老成方可任其去來純熟之後自無畏避雖然出法故爾如是而出神之工又當分別若未出神之前此神屬至靜其工仍同養眞規矩直待至神圓方可止步若神旣出之後此神屬動便不似前面工修當用逸神之法使神靈通圓融並無隔礙直至煉到神通遠顯方可休息從此以後務宜逸養元神或遊山而玩水或靜坐以操琴常從樂事快爽無邊遇有功處且行功當立行時便立行神功運用道妙無窮苟能八百行滿三千功圓那時金書選詔龍女降臨眞仙保舉待度飛昇九重天上果逍遙蓬萊洞天眞怏樂誠所謂脫下胎州襖作箇女神仙豈不美哉豈不快哉信女何憚而不行哉第九則待度飛昇女丹之工業已修成養就純陽之體出沒自由無拘無朿此時廣行功德多種善根切不可因其神出逍遙自得便將道果置之度外或因心用意而妄洩天機或扭轉乾坤而復從世俗多言泄造物之奇行乖負天理之正種種妄爲罪該天譴工夫行到此地只宜代天宣化護國救民功行滿日自有上聖高眞度脫飛昇那時上朝金闕膺受勅封從茲永住天宫快樂無邊女眞修成何以必用待度因其血弱之軀假内工修煉以成陽體體雖成陽而陰凝之性尙未煉盡故女子工夫少還虛一段運用未能盡天地之妙化所以不得超昇世外者悉由體相之不堅故也不若男子之體已煉成金剛不壞之身還虛之工養成神光充滿天地故不用待度而可了道成眞親朝上帝遊晏蓬萊若女子則不然女丹修成務必廣行功德倘功德行滿上聖見而憐之保奏上帝方得勅旨下頒金書選詔證得人天無上道果否則就成一箇散仙而已不能與天地齊夀終歸運化女眞修此若到出神之後直待上聖拔度歸眞方可了手倘功行完滿永受人間享祀上可以代天帝不全之化下可以救世人疾苦之厄功德圓融與天地齊夀日月並明躱脫輪迴直超刼運無生無滅至此方稱閨中雅秀閫内高人但願世間有志女子毋自棄焉第十則了道成眞女子修行所貴者在於成眞了道若修行未能成眞了道猶如田中之蛙未出泥途一般終歸是那孽海之物焉能躱得脫輪迴超得過劫運復還爲先天之體雖然此等道理只怕人行不到若能立志堅心道念不改終身由之而不失其正理勤勤弗懈亦不過三五載功修便能證上乘果位蓬萊洞天逍遙自在那時生由我生滅由我滅天地造化皆在我掌握之中誠所謂一人成眞九玄皆度斯時德敷宇宙功及九泉上帝眷之天仙喜之神明畏之人民賴之萬劫長存千秋享祀極人間之快樂享天上之逍遙朝遊海外暮宿崑崙挾持天地澤遍寰宇任爾凡夫說長道短總莫能及修行這一件事若舍此而向別求是人行邪道豈能了脫生死證道果於將來後世女子當明鍳之偈曰丹工雖已錄簡編其中道理妙而玄十進步中操得詣九還丹内覓的端不是知音休顯示倘無緣遇莫陳觀苦我類數辛勤力遺留後世待高賢
