front:
  text: 女丹合編女丹要言
  hash: sha256:6b2d1b57e8da39cce930840b189ca60eb6e85a33905d0096424999c2956e2b71
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_16p001a}
body:
  text: 純陽呂祖傳皈依弟子傅金銓敬錄精炁三華自不衰淸空紫氣仰成規金丹九轉元君煉夀似黃安坐寶龜淸空紫氣之文元君之所授也黃安坐龜人問幾時坐起答曰此龜畏日月之光三十年出頭一次我坐是龜見三出頭矣汝等不明老陽無生息吾有一譬如月之初三是蛾眉到五六日仍圓者也婦人脩煉如男子一樣難得者是皎潔須知婦人之欲過於男子或到經水已過之後其心如蓮之初放乘天之雨露纔結其實婦人若無男子是孤陰矣孤陰不生蓮花若不受雨露之恩縱得之沃土終歸無用天之雨露非爲萬物發生計不虛此一舉乎雨露不受於萬物是獨陽不長矣夫道卽物可證隨事可通淺淡云爲皆具至理無如人不思而通之耳婦女可以按摩之法用之當早起靜坐一刻以右手向内按定心左一手在腹臍撫摩二十下隨手摩至腰一揉一拍左手按心右手撫摩右手按心左手撫摩兩手在腰一揉一拍後再用兩手擦𤍠面上一擦兩手摩至兩耳一按一彈彈後隨揉至兩肩一捻運動津液嚥下腰一伸立起兩手一挱走數步再出外做事可也晚間亦如此做照服丸首烏二尹核桃三尹麥冬一兩熟地兩半故紙六分砂仁三分杜仲八分天冬一兩生姜三分右藥八味共研細末以猪脂猪脂猪油也吃葷者用猪脂吃素者用人乳或牛乳羊乳均可乳卽酥也非葷也西北人所謂奶子茶者卽此能令人壯精神潤顔色黑髮延年佛祖在雪山苦行時食之故至今佛門不忌若假酥油則多羊油矣不如用人乳爲是半斤和爲丸服一月精神强健黑髮延年非他藥可比每月逢寅午申亥日用水一碗稱藥三分早起向東吸生氣三口嚥下唸曰日出之光本乎眞陽我取東方之正氣煉成玉液之瓊槳太乙金精貫頂離宮煉就純剛明二氣化北方厚體在中矣合掌伸七次以指書高上神霄長生無量保命天尊於用水碗内吞服丸藥後向西方吸氣一口吞下之後任憑應酬事件愼勿輕傳非人若大丹成就再配藥服之
