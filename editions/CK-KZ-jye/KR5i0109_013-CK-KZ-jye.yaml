front:
  text: 女丹合編女丹撮要
  hash: sha256:c5989e1b30f4325819a52c346185079f21fbac274c3942c2406c75a0f0152be4
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_13p001a}
body:
  text: 濟一子金谿傅金銓彙輯呂祖步蟾宮詞曰坎離震兌分子午須認取自家宗祖地雷震動山頭雨洗濯黃芽出坤土捉得金精牢閉固煉庚甲要生龍虎待他問汝甚人傳但說道先生姓呂上藥靈鏡三命篇曰命之微難言矣其中消息千變萬化人之臍曰命門中有黃庭後有幽闕上有關元下有氣海左日右月皆光也命之光亦有三焉光之黃者丹田白者胎元紫者血元血元者乳房也在中一寸二分非兩乳也男子之命在丹田丹田者生丹之眞土也女命在乳房乳房者母氣之木精也胎元結胎血元生血丹田生丹工夫在子午二時存心看乳房之空竅呼吸綿綿出少入多候月信至時從丹田運上乳房月信者非以經至爲月信者也信之一字如人在外尙未回家而信先至焉信至之日彼自知之或腰腿疼痛頭目不安不思飲食此信至而成血也乃氣也當在兩日半之前專心用工若經行則赤龍陰精不可把持亂行妄運殺人不少須待其經後兩日半以白綾試之其色黃金乃經罷符也照前工運上以斬之如此數月則經變黃黃變白白化而無矣觀此以有還無之道也女子以血爲腎乃空竅焉過四十九𡻕腰乾血涸無生機矣養而久之又生血元似處子焉此又無中生有之妙也見其有之一斬卽化而命生矣此時則用性命工夫與男子同也臍中風生雷鳴電掣木靈之化也雲蒸霧變花笑烏飛土元之生也誰知其妙哉懶道人曰女命何以有三謂上中下也上者陽穴中者黃房下者丹田少則從上衰則從中成方從下耳又女子内陽外陰先須斬赤龍以全其體則坎化爲乾矣然後用男子之工修之一年卽得以金丹在其中故也太陰修煉法曰太陰煉形之法與太陽煉形之法大同小異初下手時閉目存神大休歇一場使心靜息調而後凝神入炁穴在兩乳間心窩上將兩手交乂捧乳輕輕揉摩三百六十遍將氣自下丹田微微吸起二十四口仍用手捧乳返照調息久久自然眞息往來一開一合養成鄞鄂神氣充足眞陽自旺其經水自絕乳縮如男子是謂斬赤龍如此久久行持後不必捧乳吸氣只凝神於炁穴回光返照是謂𢆯牝之門也眞息悠悠虛極靜篤陽氣薰蒸河車逆轉萬朵紫雲朝玉宇千條白脈種泥丸自覺一點靈光不内不外由下田上升絳宮泥丸下重樓歸於金胎神室十月工夫陽神出現與男子同初無彼此之別也先天𢆯微曰女子未生以前父母媾精之際父精先至母血後至血裏精而成女形女子受生之時先得母之鉛炁一兩先生右腎牽一條絲於上而生雙睛牽一條絲於下而生金丹自茲以往十二日生癸水一銖一百八十日生癸水一兩自是而後十五日生癸水一銖一年生癸水一兩至十四𡻕生癸水十四兩於血海中同前胎内帶來二兩共成全一斤之數三百八十四銖合周天三百八十四度一年得三百八十四日易卦三百八十四爻天地之數陰極陽生癸盡鉛現故二七而天癸降矣十四𡻕天癸降後至廿六個月零七日半耗去癸水一兩至四十九𡻕耗之已盡中有秘訣難以盡言脩眞辨難或問曰男女下手處分別如何答曰男子下手以煉氣爲要女子下手以煉形爲要煉氣者伏其氣也伏氣務期其氣回氣回則虛極靜篤歸根復命而白虎降煉形者隱其形也隱形務期其滅形形滅則四大入空剝爛肢體而赤脈斬男子白虎降則變爲童體而後天之精自不洩漏可以結丹可以延年女子赤脈斬則變爲男體而陰濁之血自不下行可以出死可以入生故男子修煉曰太陽煉氣女子修煉曰太陰煉形又問女子煉形不伏氣乎答曰女子性陰其氣易伏而赤脈最能害道其所重者在此故下手則在着重處用力赤脈一斬氣自馴順非若男子性陽其氣難伏譬如男子伏氣三年女子一年可伏果是女中丈夫得師口訣行太陰煉形法三五年間卽可成道比男子省力但女中丈夫最不易得不易得者剛烈須過於男子百倍之力者方能濟事若與男子等力者萬萬不能又問大道不分男女何以男女有分別答曰其道則同其用則異蓋以秉性不同形體有別故同一性命之道而行持大有不同也問赤脈如何斬答曰赤脈本身後天之陰氣所化陰氣動而濁血流欲化其血先煅其氣氣化而血返於上入於乳房以赤變白周流一身自無慾火炎躁之患慾火消而眞火出從此穩穩當當平平順順保命全形自不難耳
