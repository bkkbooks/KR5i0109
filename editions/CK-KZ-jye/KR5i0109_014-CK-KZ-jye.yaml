front:
  text: 女丹合編女丹彙解
  hash: sha256:1a772f3b7a497d0072c02e438d212812e5cb702c605b49b53a7dd89315e89155
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_14p001a}
body:
  text: 無量劫佛編輯廣東月西老人述玄天上帝曰易曰乾父坤母隂陽之義昭昭可考有天地然後有男女則隂陽之道又不言而喻則是有天地之不可無男女也明矣男受乾坤之變化而成其象女亦秉乾坤之交泰而有其形凡具茲形象者皆具乾坤之炁而同列於宇宙之間耳今當慈航普渡之際寶伐不知男子之精其炁充足女子之血其炁甚微故名之曰男陽而女隂也修吾道者絶七情爲本斷六欲爲先則微微之炁又較於男子者多矣何也男子之心易動女子之念略靜動則而炁易洩靜則而炁易長一則易長一則易洩何啻千里之謬歟男子之七蓮易收難放女子之七蓮易放易收荷能眞心不懈不待三五之𡻕而甘露常降七蓮常開開之易豈有採取之不易哉男女之辨於此明矣若集中之言虛言空言玄言妙言神言化又男女之大同也吾再分明而辨其眞焉果仰辨乎男子則以胎名女子則不言胎而單以息名者恐後世之人錯認胎字卒受誣名鳥乎可女子之息不結則巳一結而封固再結而自守三結而穩根强此三者故所易放而易收貞女節志可不急急以悟其妙耶更道而論之女子之氣息原體本柔所不柔者後起害之也有志超塵者只戒一箇剛字常切一箇柔字苟常柔温不息則虛也妙也空也玄也盡儲柔字包括於萬物也再者男子之神出眞必至純至陽而始有脫殼之機陽中含隂也女子之神出眞不同於男子之神也又何也女子造到三陽之時卽可脫化百里之遙造至純老二陽之會則一出永出斷無殀折之患矣蓋男子陽中含隂女子隂中含陽男子隂在内而陽在外女子隂在外而陽在内陽勝則諸陰易退吾今不惜眞脈道破於斯無非切望早成眞者之多耳玄天上帝批曰可知女子之的丹乎吾所分者的的確確至他法他訣本同男子其不同者此中之竅誒也廣元佛批曰結丹神化脫胎原本虛無自然何有功用之可說乎金沙古佛曰大呼同縁細聽吾言厯年修煉卻也心䖍功難上身豈無弊端有法無法常常點穿有念無念卻也細談多犯拘泥又是那端多犯執著又是何愆皆由世俗雜於後先後乃六欲先乃靈元先後並用靈炁不翻先天之炁一線牽連三關九竅竅竅皆然一雜後起便隔玄關先天炁阻九竅不安一坐之後節節辛酸遍體拘强炁未通關一竅未到患卽相纒爾等修煉誰知此番無發慈悲下細指穿以便防患莫怪上仙以法悞爾箇箇膽寒先後有氣只分寸念念本難淨須聽自然切忽拘念拘卽阻關中田一炁全體聚焉仙云採取採取先天後天念絶先天自然合而爲一三關充滿配合隂陽兩兩相連隂消陽長固結一團丹從此長芽從此沾今察眾生每患病纒皆屬先後未分界限吾與點出箇箇思勉未上坐時先須㪚淡勿拘勿京活潑自然然後上坐更無拘牽隨其念來隨自出焉隨其自化只將神全念若堆積毫不沾絆閉目思睡身化形完無人無我死尸一團如此用功病自安然更不惹病全體舒安拘念炁阻火卽焚原著意炁㪚邪更燎然病從此起燒乾眞元女子血海氣化出焉邪火一動蒸透命原血漸枯槁醫治難痊血動之時更宜舒展躁性勿發怒氣勿沾念更宜淨神更宜恬隨其紛盡始坐自然倘作躁怒觸犯中田朝夕心𤍠口苦舌乾皆由此起誰辨此端修煉之人絲毫勿犯箱著塵迹大壞眞元爾不自覺患卽來前身冷身𤍠皆由有偏莫謂修煉卻病延年倘不知檢患莫大焉一時一刻念念檢點勿犯勿觸易長靈丹不須期望玄而自玄不必苦功丹結九轉不必苦坐無時不禪閒居行住皆長妙丹爾等修煉心非不專後起參入先天隔斷鮮不受病何怪諸仙吾今點出細心相參一切妙法利勿割完毫髮勿差絲毫勿沾朝夕優游灑灑安閒有食無食莫𦊱心閒有作無作更勿周旋如是百日妙景自𣷹能修一載萬象自然莫拘修字煉字更兼一字不泥化如木泉始算眞修始算眞煉修本鋤惡煉本渾全有形加煉病自入焉無形自煉煉乃眞玄今日吾臨萬象概删先防六賊亦聽自然有心而防難中之難無心而防勢必自堅牢不可破何用防閑大眾婦女同心勉旃身居何等念立何願事本尋常切莫看與浩浩皆由此處發根竅以大處而論百脈皆由旡極分形造以細密而言又屬無形無象𨚫原萬化盡包到男女俱同此至寶只分血精兩條男精逆行而成仙女血直騰歸心竅故而各有各法各有各照女功雖用凝字法莫將心地𦂳相抱如果意馬難拴住稍著片念血海潮血海與氣海兩下有分曉血海以前只七分此處卽是氣海竅竅在那不上不下不左不右一妙竅血化氣凝化炁妙後天之氣先天化一雜人欲便隔到有後無先成凡種仙凡各異須知道道在此處不算道炁必歸根旡極竅方能凝成此靈苗方能結丹火候到此點先後何以分分出火候更莫少癸水若未至勤脩莫懈怠朝夕活潑兼樂好太鬆精神散太𦂳閉炁竅必須不鬆不𦂳不遲不早不住爲住不好之好不凝爲凝不照自照此點火候甚微微眾女雖當仔細料不識此點不算脩脩煉二字須忘了多以煉字太著迹一著便卽病根擾此病一染著藥物難達到世人動云病根在臟腑此病根藏在髓道藥何以能除全仗純陽一點貫内竅方將此病除得了好好好吾再示一則再將火候撥幾層不與層層撥終歸含糊於不明必定受病更深沈炁之冲騰須歸竅動時不能靜始生使爾不知不覺不見不聞歸根後一動性命陰陽會水火旣濟分旡極而太極略微二字須著意可也包含化渾淪上坐稍凝煉無相凝莫存有相略微住一有靜機便莫擒聽其自然而靜不可妄參一識神一切齊放下睡也由他昏沈也由他一毫莫錯驚此點火候少人識多係將靜妄動身一動炁散成魔障千千萬萬意紛紜到此時卽便下榻來散步等候一刻上榻衾再行去養靜靜自易歸根若是强打坐疾病内栽根再有心多妄先睡而後用凝神無妄切莫用有妄便煉心煉字須活看微凝恍惚而杳冥方是凝煉法方是入靜第一乘此卽上坐火候法動時火候要分淸動候必覺覺時莫雜塵天人此分界仙凡此處分儼像赤子體未覺先天體已覺後天生此界當細審覺時初刻猶恍惚覺初再轉萬念縈初字再字義電光一閃頃若無紛紜象正念聽炁分倘有妄想擾凝煉進一層亦是聽炁還陰陽兩下復元再遊行用此功夫當莫懈舍此一法非上乘吾今點此眞妙訣男女一齊記在心不是眞種眞心煉輕洩天機被雷霆法雖甚淺淡細思絕妙始見精此卽未得金丹時朝朝不離此法門白蓮眞人曰立志貴堅貞總勿染塵氛法本平而易運行勿留停有時法當用須知勿太矜有時法當捨默守本來眞動靜兩相參刻刻會天心貞女原無法不過聊點睛血氣有衰旺涵養功宜深久則血化炁白膏貫周身自然陰成陽紅塵不動心方能成乾體方能證上眞稍有欺僞念猶恐墮深坑白蓮眞人曰節爲脩行之階級貞靜無塵卽初禪更加脩煉養眞炁陰降陽升露玄關玄關不在身外求卽在寸地覓大丹心果靜神果閒活活潑潑運周天炁也歸源血也歸源細細烹煉爐中間暑也不𤍠冬也不寒温温養此眞蟬娟十月丹完全三載乳哺聽自然自然飛昇大羅天自然飛昇大羅天金沙古佛曰女丹從何得來男與女兩不相侔女與男大相懸殊男丹由精化炁炁化神神化虛虛極靜篤而丹自結矣女丹由血化氣氣化神神化虛虛無自然而丹自成矣但氣雖由血所化卻有兩解如心不定念不潔身不𡧾氣不平則血亦不能化氣而血自爲血氣不見氣則血盡成濁而信皆露矣夫信本污濁之物何以化氣蓋化氣者血而所以化氣者血中之元炁也元炁者何血爲通身之精氣有此血而精氣以藏無此血而氣無歸宿血如海水水凝而炁凝冲天則雨露以降人身有血如海則血自化氣而上達遍體然後流通百脈百脈貫而一點下墜由此而丹望結矣不然滿腹俗情日外事性氣躁妄紛華牽連憂思鬱結妄念打擾終日無一𡧾靜則濁氣隔斷眞炁天地不交陰陽不調寒暑不節週天不合而病有不成者百無一二此非道之咎實人之咎也吾今指點眾生各宜細心體會莫謂道不眞特患爾心不眞耳爾心果眞掃盡浮念去盡紛華和緩性情暴戾不存解脫憂患而神恬快樂斬絕外務則天氣下降地氣上騰先天眞炁自然流露充滿海水氣亦自與神炁相接不坐則已一坐而自自然然其中有無端妙趣較之人間一切別有一重天地方知道不虛而仙不假訣不悞人但要自性自悟可也吾今再下一丹有謂赤龍不斬而丹不得結道不得成者不知血盡而氣亦盡矣如男子之精敗而丹亦難成其理一也蓋男精女血多不可絕氣離血而氣無由生血化氣而精始流通如謂血盡而乃言煉丹何靑年血枯而病反起此終不離血之一考證也又言煉之數年而毫無影響非無訣也實心無靜時之故也雖在朝夕打坐十二時辰無一二時靜定卽或有定不過數刻而已氣何時化神何時凝丹何時結經年累月終成一頑人耳動云某某脩眞某某守節不管人間一事吾察其實卻與俗人不相遠矣又云某某旣得眞訣某某脩煉多年而毫無一成殊不知得眞妙訣者始勤終怠多年脩煉者姑待苟安如此脩道其誣道也實甚吾今勸爾眾生論爾之富富不敵吾論爾之貴貴難比吾論爾之衣服飲食更難比美夫吾吾且當下割盡爾等有何難捨了割不下眞癡而又癡迷而又迷恐終成無縁之人也可痛也乎蓋仙佛以慈悲度世世人切勿自棄其仙佛可也吾本以普濟爲心爾等幸勿自絕於吾可也普賢菩薩曰朝夕脩煉望結金丹有丹之汞不煉之丹丹在身中無形無端有端非妙無端絕玄玄處丹就無玄不言有心而煉枉費心猿不煉自煉方名大丹丹本空降天地一元有形之氣不算妙詮無形之祖萬象包涵一得永得空空盤旋物之生也此處兆端物之榮也此點鼓焉物之藏也此妙爲嫻有形有象乃曰後天無象無影先天之天後天生成先天兆元人之生也理本一元無象無著内藏一玄後天遮蔽玄者不玄今開妙法點化有年人誰不知後起難言一朝識神念未淸潭多參人欲少見道玄七日一復卻也甚難心多昏垢神多迷涎不皎不潔不淨不乾神氣兩傷焉能通關關且難通竅何發端竅旣不發何運抽𣷹抽𣷹不運枉坐蒲團吾且重說收斂神全收乃自收卻有玄言一念偶動卽便自轉出須有時考驗中田前點妙法如如動玄如如有動又如無關此如如動天地兩捐忽發如如姹女交關此點絕妙從未有言吾今細點勿輕妄傳丹經典籍每部唱言俱說如如姹女配鸞此乃全話未分界限亦未分時又未分先吾今言者再與細研如如一動先後兩沾知如如動胎有鍵關渾渾而動如如自然方明考驗神出之端知動而動猶兼後天不知忽動如如快然妙不可指樂不盡歡方曰如動大丹成焉見此妙境自無塵縁相不待掃諸念悉捐藴不著空空空自然不著空相萬境空潭天地之運我渾一團天地之靜我與一玄天地之生我與相兼天地收藏我與一元造到此處大覺始言未到此境仙成猶難何悟大覺豈輕易言吾今點化如如一翻機盡洩漏妙法無邊瑤池王母曰眞女本童體只在淸濁分鉛汞雖全備奈已變成形一入胞胎後不得以眞名旣已落後天豈能便飛騰元炁縱圓足亦宜煉渾淪自有而返無方可言歸根若論返還理女子未知音常常執著守兩眼照乳庭淸濁難分辨混淆炁怎凝淸升而濁降一定理常聞過執炁不運濁氣反上騰淸炁卽下墜如何識命靈女子無他訣活潑是要經心活炁自旺神活炁自靈意活炁自固性活炁自升活潑非在外心中不著痕心定方上坐上坐息調勻息勻身體化眞樂此中生樂而忘其樂週身炁渾淪自然歸祖竅關鍵毫不存能靜一刻久一刻歸中庭能靜一時久一時炁迴縈朝朝能靜定一月功有靈百日卽有驗一紀定飛昇何以能此速元炁未漏崩可惜太束縛氣血兩不分時而氣化血時而血化銀化時毫不覺徜恍又轉傾所以經年月猶未見功靈反轉成枯槁病疾惹上身不念大道闡豈能辨明明香逸古姆曰吾今談玄理專言女法王女本屬靜體陰中亦含陽守靜終難靜機關藴中黃靜雖是本體御柔猶賴剛剛爲陽之主柔乃陰之藏識得柔中剛可致弱中强氣血屬後起祖竅自發陽一炁通四體百脈皆瓊漿赤龍何用斬濁盡乃流光此原有分別婦女兩分張婦體非全體元炁已受傷欲復坤陰炁發動在乳房微微用眞意引火用貴良稍爲太著迹血滯病暗藏有意無意運勿助亦勿忘久久炁歸源陰氣自消亡陰伏陽乃升煉成乾元剛處女不必用眞靜始終方氣靜血自化神淸炁自揚不知亦不識變化概包藏週天分度數不滯合陰陽始由血化氣終乃柔變剛一月炁交會去濁留元陽濁盡淸上升自然滌穢腸光明眞皎潔骨髓露瑩光倘不淸本源念慮必暗戕火熾周身𤍠反道現眞陽若知止火法無意默而忘邪火頓消滅眞元尙無傷此點眞口訣婦女當提防果能眞如是道成會法王白蓮眞人曰出塵有志立意無偏尤宜外内加收斂寂然不動是本原安靜久坐煩卽散稍著拘牽炁難圓女本屬靜靜中煉眞炁躍躍自騰翻忘意忘言守至善不遷不移合玄關炁行切勿滯炁住勿稍𣷹烹煉未咸宜寒燥皆屬偏果能照此行功圓見先天先天從何見只取心頭無𦊱牽不牽不𦊱神自活神活性命兩相旋旋轉不息陰陽會交媾眞炁自滿圓圓圓滿滿通貫頂由此下降滴七蓮蓮得甘露花心活七日七朝便開繁蓮心一繁眞心現自在如來遍大千大千世界任遊轉看盡紅塵苦海邊方知羣仙點妙訣眞不悞人駕慈船世上貞節急急煉定許果結遊西天廣慧古佛曰吾今統指一火候是貞節女共參觀不拘榻前强打坐優游散淡不拘拴任其自放自收束一時念靜自參禪一時不靜休上坐强坐炁反隔祖原此點元炁靜中來優游漸長兩纒綿纒綿亦有考驗訣神若昏昧想貪眠然後輕身榻上坐一坐眞炁會自然不用此法神難合此功日久頂上圓但要化盡絆身累易去後天接先天若非貞節兩等輩休用此功妄去貪若貪此功成睡魔反使神炁隔竅關再撥貞女脩行訣子時陽動下榻前默唸佛號三五十再行用功照點前子時若不身移動天人交戰在此間能移身法化魔累佛號一聲澈地天辰刻不宜輕移動妄動神機敗本原此乃脩眞上上訣貞女一同共參觀何分兩等撥火候貞女神原在兩間節婦志向雖堅定卻多傷耗未脩前内藴元炁俱傷敗另起爐竈始還原辰刻昇坐神炁足不足不動更傷丹丹何以名脩有形丹本炁凝號曰玄玄卽丹之別名號神圓炁自兩復還此貞節女眞火候脩到百日再點丹女本眞陰藏眞陽故點辰刻用功參子時一陽初發動遊行活潑運周天一陽動時眞陰旺上坐必便自抱還所指中藏天機妙留心揣摩勿妄談口中說訣皆是假眞修還在念盡捐能除萬緣淸似水明珠掌上放光圓瑤池王母曰吾又題醒女子金丹由漸而進由勉而安由下而上由後而先漫漫烹煉漸漸熬煎不鬆不𦂳火候自然期至水湧北海滔天如河泛漲急靠爾船若是淜浪定許失船養靜女子海水甚堅一到期滿如火燎原倘不停功禍起眉前停一七日二七無嫌勿謂懈怠功夫難𣷹必待露淨再言參玄若不待盡穢氣相參水泛海潮時至周徧竅竅聚會周天已滿同流而下故曰滔天如河水潮百瀆流泉山溪小谷共聚一團方曰泛漲此理明言養靜不停逗期參禪眞火一發惡穢燒乾卽成痼疾藥苗難痊不但北海穢枯燥乾百脈阻滯膏肓成堅力難破血乾入髓間吾今指破下細與談勉受奇禍個個畏難此卽妙法必不輕傳吾今點出鼓勵女媛多停期至自不病連期至之日活潑爲先勿憂勿悶七情悉捐六欲掃盡悠悠然然瀟灑自如冷飲莫貪太辛辣物亦莫咽沾自然去病一生安閒此緣之中又分幾端今世造道前生累寃寃寃相報亦難身安多受病染緣難結全半途廢者暗有周旋生雖不樂殁卽證仙生能造成金仙手拈由仙而上直歸西天生死兩途何掛心間吾今道出眾位女賢苦中受苦勿貪旨甘略略放過掃盡俗縁俗縁掃盡眞神自全全此一點飄蕩仙山欲登寶塔任爾高攀欲到普陀隨爾足探欲遊東京任爾閒玩欲至西土佛引過關欲步靈霄由爾進前吾所言者並無誑談女子功夫與男相兼只分地步地本非玄一切妙化俱不異男爾等切悟書中載全毫不差錯各自脩潛切記切記吾甚心歡響月文通古佛註禍起眉前者血潮如火蒸也如不停功以火攻火則血𤍠而成枯焦之患矣海潮者卽月信流露之時應宜停功靜坐苟不停功數日如舟行河内明知波浪洶湧而故將船放必失大事謹記勿忽響月文通古佛曰道雖分層次不過爲脩煉者把心拴若論貞節不須煉眞靜二字始終玄女本屬靜體翕闢發自然靈炁自發現血化爲金丹陰氣消融盡眞火蒸髓間何有凝滯病何有斬龍言不化而自化坤位轉成乾響月文通古佛曰淸靜眞誠是妙玄莫用後起擾先天念定卽宜長長坐神昏不必死死探朗如皓月眞性體明若秋水大玄關活潑不沾亦不滯杳冥如有更如閒一靈運動渣滓化樂境層層如魚鳶莫將假身囿眞我方能返本而還原響月文通古佛曰蓮臺寶塔候斯人眞眞不昧本來因先將淸濁分明晰久坐靈炁漸漸生元炁蒸騰休驚恐任他升降自調勻勿忘勿助眞火候有意無意莫留停煩悶卽忙遊散步拘泥便覺神不甯念動是火非眞藥性靜無塵卽眞金煅煉原無分層次淘盡渣滓自澄淸不須別求眞口訣今宵言語須謹遵金沙古佛曰點醒緣中脩眞女貞節兩端聽根生知此妙訣非無法法本訣出自有箴常洗凡身歸靜地勤養仙心垢化冰多貴仙根少擾俗割斷凡骨換仙身明明常照前身映星輝七斗放光明兩目靈光常生内兩耳靈炁常閉門兩鼻不爲凡香引眞香發動貫七星一口能杜俗粗氣行住坐臥號佛聲兩手不沾人情態多翻貝葉唸諸經兩足穩住天台上丹室禪宫漫舉行步履輕搖心便蕩妄動耳目卽擾神神擾心卽隨機出散漫無歸炁何勻内吸不勻外氣擾内外一吸自歸根内主不搖神自穩搖動不甯炁難盈卽或有動眞機轉困頓無歸擾黃庭呼吸一勻先天動後天自讓先天行若能念死後天絕先天自從左右生此機本是自然來並無功用訣點明吾今指盡無上妙望爾凡胎照去行同守眞志休貪訣點爾關竅堅爾心爾志能對吾之志爾心難似吾心淸能比吾心淸如水三載以後吾親臨現身度爾童貞體平空形飛走如雲吾形常在爾心内爾心卽是吾觀音觀音菩薩常常在功成果結伴吾身七蓮能化千萬朵千萬蓮花覆爾身此種捷徑都不去還在何處拜世尊金沙古佛曰吾今無他法將收心之上品掃念之絕妙一一與爾指的端心意走不是別一件未將大道細嚼參試想這身居紅塵如在苦海一般今生落人道來生失落苦不堪俗言一失人身萬劫難幸爾等今有緣得聞大道身坐蒲團心也不須收意也不須觀念也不須掃猿也不須拴有身如無身心似無欄關也不必觀爾的心也不必記爾的法言略取一意在乳間一刻心不定一刻莫抛散二三心不純二三莫放閒卻又不可𦂳𦂳拴也只在有意無意之間太𦂳氣必滯不注意念偏吾再有一法亦是收心上妙丹常在誦經典念雜默念經一遍只得一二刻覺恍惚念自捐自自然然功滿百日見先天一坐遇睡魔醒時卽參禪志淸不用收念起再用此法收妄念實在難實在難實在難將爾等牽纒斬斷不盡紅紅綠綠花花衣衫斬不絕南田北地兒媳情腸一大串縱是仙佛手段也難度爾上仙苑也難攜爾上吾船勸爾等莫在退卻自將金丹抛入那孽海無邊生時不知悔死後方了然再醒童貞女各自細打算前生之根本非淺今生遇奇縁並無人牽引一聽大道闡妙玄一個個自已心願看破了紅塵世界了脫這七情不沾眞乃是千古希罕果算得女中奇男但只是眼爲六賊主見不得紅紅綠綠花花朵朵披好看一念便打轉事事愛體面虛假人情費眞念吾今勸爾休沾染莫憂這事難結果莫𦊱這大緣難滿願又莫慮普陀無人喚爾能了脫人間諸掛絆自自然然有金童和玉女時刻來經管不使爾道炁被魔擾不使爾道法被妖纒一直悟到頭勿沾勿染身也輕體也便百病不生樂無邊卽至功滿日寶蓋和幢幡護法韋䭾前引路十八羅漢把駕參花仙彩女千千萬四面擁護到西天爾貞女試看好也不好眞眞是前根不亞縁法賽天仙苦口良言切戒汝惟冀個個記心間圓明道姆曰圓明炁本圓炁原藏一穴一穴分九竅東西並南北星象列宿位以一爲轉折不睹亦不聞似有似無別有無歸中候煌煌輝四廓此穴不多大萬象盡包括大如天邊外小配形難測高而三天上卑又海底澈穴道分明點人皆聽淸白今非重重點精微難透澈不陰亦不陽陽精媾陰血陰氣歸血海陽精此發洩發動人不覺恍惚心甚悅飄飄而蕩蕩淸濁分皂白不樂心焦悶陰陽兩不接一得神飄渺炁包無阻隔子午蓮方吐陰陽兩交叶陰合陽祖炁蓮蕊遍池列陽配陰祖炁花開茂枝葉此處一花放七朵盡行洩血海通祖炁祖炁又歸血血枯炁必阻炁阻血自竭阻竭病何起皆因炁鬱結鬱結又何來拘滯不灑悅因心不脫落先後氣關閉閉是下阻上塞是憑空說因閉血不動不動乃阻塞炁阻關自閉一線不通坼血氣有淸濁淸濁何分別心淸無私妄呼吸亦皎潔皎潔合眞陰眞陽自交迫淸濁自然分信不失一月輕淸而上浮濁自下漏洩心雜氣必燥呼吸亦猛烈燥與陽相交邪火發如鐵便燒眞陽炁乾枯病易得世醫如盲瞽診脈藥妄切先將氣血補通關毫不涉一旦濁氣凝經絡更閉塞及至心病起煩燥又發𤍠口乾並舌焦食冷暫救烈醫術更恍惚問症再分別一聞𤍠症起凉藥用知栢先補而後冷痼疾了不得服盡百草物形容漸瘦白及至莫奈何參茸加歸鱉滋陰又培陽頭緒更亂擇脩眞受害累个个怕悟得不脩猶快暢脩來反受折吾今明吿戒血停有規額血如山谷水浸流督不得一督亂竄發反觸正脈穴不得不徧流甚至冲過格人身血海内只有三條脈氣海與血海任督總一穴精從此處過濁自此處洩若非寒冷滯必不至阻塞塞而不順流通路把藥切須温休太燥分淸濁自別如是治此病妙手稱上客吾今與點破以免受𡨚孽分配陰陽路男女指一節男有此祖炁分配在精穴女之祖炁合陰從血海說男有此陽關順逆不須惑女有北海地波搖似水迫大週天大動小週天亦闊十二時辰候子午二極接此點有分解有脩未坐宅脩者子午合眞炁眞媾結未脩仍交會眞祖炁難洩此處眞命的勿輕妄與說北海有淸濁濁者氣淡泊濁乃形質露是日念掃絕念淨淸浮上與祖炁相接念雜氣入質淸反歸濁𣶋月信多差錯卽是念太墄念墄神自昏神昏莫分別淸濁兩混雜眞炁不上拍果常如是樣如是病發脈必得是日到不想妄自滅優游無稍滯灑灑而貝葉貝葉不慮亦不愁不驚亦不嚇不張亦不大皎皎而潔潔行住無𦊱礙惺惺而悅悅不識亦不知聞聽念不涉形骸似飄蕩天光而地白手足如輕撓浮動不沾擳最忌心太猛念恐功有缺此念是大病快快治宜切三七露未盡牀褥莫拘節聽其露盡時上牀方合格此乃一定法非人休傳訣天地之精英此處一旦洩再望爾婦女心中莫記訣無訣道難明執訣炁有隔平居心與口多把佛號默有念方默著無念不必默只將人事了手莫探花蝶不過衣鞋制常探内功烈手作人間事念冷如氷鐵眼爲搖必賊莫著花影色此乃俗骨累爾願立脩德脩德與脩眞脩性脩心慝脩慝德自新一朝炁蒸耶超身雲霄外飄飄臥極北吾駕鳳凰輦金花仙女接引爾遊上界攜爾到佛國仙塔登幾層眼觀大千陌紅塵勞苦輩俗胎甚慘烈南天一觀望代爲淚垂帛縱是大慈悲難將無縁惻卽是大願船莫渡自作孽西天大佛祖萬法總難絜吾本圓明祖降臨於此宅分分明明點望爾心甚切莫忘諄諄吿朝夕靜是訣欲多來擾由於眼招賊眼見如未見反觀思内穴不輕亦不重不急又不歇不燥亦不妄千般亦不迫不沾亦不脫百感概消滅不樂自然樂不絕自然絕上坐休用意死尸恍默默天崩爾不崩地裂爾不裂人言休動氣自取自明白淸福與紅福觀紅如視黑靑白分眞僞人雜類各別我無金剛體妄遊極樂國長短莫計較不聽自除耶高超世幾等不與俗同格志大言勿大心眞念莫怯常常體仙佛在此談玄訣婦女書少讀性理更難得只守一念淨絲毫内莫塞如光天化日如星又似月如北極之亮七星掛天闕明明而朗朗昭昭無點黑爾心明似斗内七星燦𤐌皂雲雖遮蔽本體仍不絕雲過星猶朗爾心如星炟心中無一塵有塵心走別心本原無妄因見妄入宅心本無他想耳聽便遭阨心本無沾滯因身不便捷身口不合意便動怒不悅有此一怒態五臟火發越此根不除盡枉把道脩也吾今下細點貪字宜割截衣食固莫貪自然有湊者善念亦莫貪仙凡念上別妙法亦莫貪守靜妙莫測功夫亦莫貪隨時快坐攝妙境亦莫貪境象無形色安安而樂樂歡歡而悅悅瀟瀟而灑灑悠悠而闊闊卽是妙景象此象貪不得由他自來去由他自然結由他自變化由他自交接念靜神不擾二三載必得吾今大慈悲逐一吿知者爾婦女等輩莫拘是妙訣一拘卽成病莫怪道誑惑内外皆莫捆神活炁超越遊行念淸朗心自皎而潔來往又何拘天高月有缺人生難滿願到頭知紅黑此時風氣薄人言聽不得各脩各性體仙凡有分別仙原仙根來凡本前生孽今生雖富貴身謝甚可怯不帶有功善罪過註黑册一生無善折銀錢空手撇只帶一身罪塵埃膝屈血罰入大地獄來生作聾瞎仙凡此分界脩煉又有說縱難成上品仙佛代解厄養性閣中脩功滿朝上闕脩眞丹滿足佛旨下仙帖金童執寶幡玉簫天地澈迎爾歸極樂永享千萬劫不入輪迴道不生亦不滅不死亦不老長生榜上客時而烟霞伴時而鳳閣歇時而天涯轉時而海島閱觀不完金剛美景看不盡琉璃彩色這纔是功行圓滿大快樂這就是脩道歸根的大妙訣
