body:
  text: 女丹合編西池集跋易曰至哉坤元萬物資生所謂順承乎乾者非耶然世之女子明坤道而合坤德者鮮矣或癡頑結習或奢悍成風種種沉迷不堪悉數卽有一二有志之輩欲逃生死究之性命不明每見巫嫗邨姑學些口頭禪語前果後因便爲大道在是而肓脩瞎煉自悞悞人吁此皆坤修眞訣失傳之故也今西池集出洩千古不傳之祕具大慈悲開方便門願普天下女子敬信脩持窮研極究其中字字有功句句有訣莫輕輕放過尙有楮墨難傳之處全在誠心辦道自遇眞人指點總以收心養氣爲下手初功心不收則性根昧氣不養則命蒂失性命雙脩坤道乃全讀是集者幸勿坐失機縁以負作者一片度世婆心也靈陽子敬跋
