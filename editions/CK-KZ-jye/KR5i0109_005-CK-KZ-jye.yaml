front:
  text: 女丹合編男女丹工異同辨
  hash: sha256:2bb7fd2e4593dc013dd9f90a44fdfdd32524706570655af194671dde61512a08
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_05p018a}
body:
  text: 竹陽女史顏澤寰晏淸纂述仙井女史賀爲烈全貞參校集說孫元君坤訣註曰彖曰至哉坤元萬物資生坤屬老陰陰極陽生順承乎天則生人生物順承乎己則成道成眞淸烈古佛曰凡男子修行皆從初工運煉築基起手若是女子修行與男子不同男子陽從下洩女子陽從上升男子體剛女子體柔男子用丹田陽精常常保守不致外洩積之旣久用火煅煉使精化爲氣氣化爲神神化爲虛由漸而進工完了道飛昇若女子則不同女子乃是陰濁之體血液之軀用乳房靈脂變化氣質久久運煉自然赤反爲白血化爲氣血旣化氣仍用火符煅煉亦能氣反純陽了道歸眞女子初工先煉形質後煉本元不似男子之工先煉本元後煉形質其體各殊其工自異若不分門立教何以能造化陰陽男女共濟也然形旣爲我有何必用煉女子之體原屬陰濁不若男子之體實秉陽剛苟不陶煉不能使血化爲氣如何孕得出先天產得出眞氣若不得眞氣仍然一片純陰又焉能復得了還丹成得了大道故女子之形必先煉而後可女眞之道原與男子之工大不相同男子之道貴在煉藥是以前假工夫逐一講明果能旦夕行之䖍心進歩使身中五臟之血皆返爲氣自然化生若眞氣潛生將陰濁之體變爲純陽工夫至此方能用火行符纔與男子同等若不分門別類其工焉能有濟故男子先煉藥後煉形女子先煉形後煉藥因其體相攸分故前後工夫差别吾今立法教人不得不分明指示方使學者無虧女丹修法其理原本不繁當其運煉亦自不難諸丹經内不傳女子修煉者多何以不傳女流蓋因其未能男女雙渡故也吾今垂法教人實願男女雙渡故此於丹書後編接列女道十則以渡有緣之輩何以女丹之道至簡不繁女子之性純全女子之身安靖但得一點工夫便能徹底造就不似男子之念頗多偏僻故其身心所向不同其工亦當淺顯發明女子之工比男子便㨗些女丹從養眞至胎息其工已得三分之二不若男子之工便有許多作用方能到得調神地歩所以女道丹書從養胎直至胎息工畢便接錄外行工修俟其外行有餘方可煉調神一假事體女眞修成何以必用待度因其血弱之軀假内工修煉以成陽體體雖成陽而陰凝之性尙未煉盡故女子工夫少還虛一假運用未能盡天地之妙化所以不得超昇世外者悉由體相之不堅故也不若男子之體已煉成金剛不壞之身還虛之工養成神光充滿天地故不用待度而可了道成眞親朝上帝遊晏蓬萊若女子則不然女丹修成務必廣行功德倘功德行滿上聖見而憐之保奏上帝方得勅旨下頒金書選詔證得人天無上道果否則就成一箇㪚仙而已吕祖曰太陰煉形與男子修煉之法大同小異初工下手是謂斬赤龍其後十月工夫陽神出現粉碎虛空一路修眞與男子同無彼此之别也綏山道士曰赤龍自斬乳頭自縮如男子一般而眞陰之氣化爲眞陽云云以後用工與男子無異但女屬靜體後四層雖與男丹同其運用而其建功更速矣吕祖曰男子修行降白虎女子修行斬赤龍三命篇曰男子之命在丹田丹田者生丹之眞土也女命在乳房乳房者母氣之木精也又云女子以血爲腎乃空竅焉過四十九𡻕腰乾血涸無生機矣養而久之又生血元似處子焉此又無中生有之妙也見其有之一斬卽化而命生矣此時則用性命工夫與男子同也懶道人曰女命何以有三謂上中下也上者陽穴中者黃房下者丹田少則從上衰則從中成方從下耳又女子内陽外陰先須斬赤龍以全其體則坎化爲乾矣然後用男子之工修之一年卽得以金丹在其中故也修眞辨難曰或問曰男女下手處分别如何答曰男子下手以煉氣爲要女子下手以煉形爲要煉氣者伏其氣也伏氣務期其氣囘氣囘則虛極靜篤歸根復命而白虎降煉形者隱其形也隱形務期其滅形形滅則四大入空剝爛肢體而赤脈斬男子白虎降則變爲童體而後天之精自不洩漏可以結丹可以延年女子赤龍斬則變爲童體而陰濁之血自不下行可以出死可以入生故男子修煉曰太陽煉氣女子修煉曰太陰煉形又問女子煉形不伏氣乎答曰女子性陰其氣易伏而赤脈最能害道其所重者在此故下手則在着重處用力赤脈一斬氣自馴順非若男子性陽其氣難伏譬如男子伏氣三年女子一年可伏果是女中丈夫得師口訣行太陰煉形法三五年間卽可成道比男子省力但女中丈夫最不易得不易得者剛烈須過於男子百倍之力者方能濟事若與男子等力者萬萬不能又問大道不分男女何以男女有分别答曰其道則同其用則異蓋以秉性不同形體有别故同一性命之道而行持大有不同也玄天上帝曰易曰乾父坤母陰陽之義昭昭可考有天地然後有男女則陰陽之道又不言而喻則是天地之不可無男女明矣男受乾坤之變化而成其象女亦秉乾坤之交泰而有其形凡具兹形象者皆具乾坤之炁而同列於宇宙之間耳今當慈航普渡之際寶筏共撑之時男則教亦多術竟捨坤維而不顧哉指男之玄精奥妙不啻汗牛充棟度女之法範典型殊成寥寥無幾也吾切發悲而獨論之男體以精中之炁而貫些子女子以血中之炁而薰些子些子足而蓮竅足蓮竅足而抽添始運抽添運而始有甘露下降之說也不知男子之精其炁充足女子之血其炁甚微故名之曰男陽而女陰也修吾道者絶七情爲本斷六欲爲先則微微之炁又較勝於男子者多矣何也男子之心易動女子之念畧靜動則而炁易洩靜則而炁易長一則易長一則易洩何啻千里之謬歟男子之七蓮易收難放女子之七蓮易放易收苟能眞心不懈不待三五之𡻕而甘露常降七蓮常開開之易豈有採取之不易哉男女之辨於此明矣若集中之言虛言空言玄言妙言神言化又男女之大同也吾再分明而辨其旨焉果何辨乎男子則以胎名女子則不言胎而單以息名者恐後世之人錯認胎字卒受誣名烏乎可再者男子之神出必至純至陽而始有脫殻之機陽中含陰也女子之神出眞不同於男子之神也又何也女子造到三陽之時卽可脫化百里之遥造至純老二陽之會則一出永出斷無殀折之患也蓋男子陽中含陰女子陰中含陽男子陰在内而陽在外女子陰在外而陽在内陽勝則諸陰易退吾今不惜眞脈道破於斯無非切望早成眞志之多耳又批曰可知女子之的丹乎吾所分者的的確確至他法他訣本同男子其不同者此中之竅訣也金沙古佛曰以大處而論百脈皆由旡極分形造以細宻而言又屬無形無象郤原萬化盡包到男女皆同此至寶只分血精兩條男精逆行而成仙女血直騰歸心竅故而各有各法各有各照女丹從何得來男與女兩不相侔女與男大相懸殊男丹由精化炁炁化神神化虛虛極靜篤而丹自結矣女丹由血化炁炁化神神化虛虛無自然而丹自成矣有謂赤龍不斬而丹不得結道不得成者不知血盡而氣亦盡矣如男子之精敗而丹亦難成其理一也蓋男精女血多不可絶氣離血而氣無由生血化氣而精始流通如謂血盡而乃言煉丹何靑年血枯而病反起此終不離血之一證也瑶池王母曰女子工夫與男相兼只分地步地本非玄一切妙化俱不異男爾等切悟書中載全毫不差錯各自修潛圓明道姆曰吾今與點破以免受𡨚孽分配陰陽路男女指一節男有此祖炁分配在精血女之祖炁合陰從血海說男有此陽關順逆不須惑女有北海地波摇似水廹白蓮眞人曰男女金丹地不同陰陽一理實相通淸心寡慾爲根本築基先要斬赤龍無心子曰男子精液陽中陰女子精液陰中陽快尋明師求指破返老還童在故鄕七日天心如可復此是上乘一妙着以後便同男子功般般口訣要師說吕祖曰婦人修煉如男子一樣難得者是皎潔須知婦人之慾過於男子或到經水已過之後其心如蓮之初放乘天之雨露纔結其實婦人若無男子則孤陰矣貞一子曰大道不問男女皆能有成故男子道成爲眞人女子道成爲元君自來丹經言男子修煉之功至詳且悉女子修煉之道多不論及間有論及此者不過畧露一般非薄女修也推其意以爲人同此性命卽同一功夫言男修而女子之功不煩言解矣不知男子外陽内陰女子外陰内陽秉性不同形骸各别雖同一性命其行持大有不同者修眞辨難曰男子下手以煉氣爲要女子下手以煉形爲要許祖曰男子修成不漏精女子修成不漏經其初關逈然各别至煉已得藥還丹温養結胎出神諸事雖與男子同而細微節次未嘗不無大同小異之殊壬辰春適有坤女問道僕以多看古書證其所授而丹經言女修者獨少難以考證異同爰不恤洩漏天機之罪因將其所以同者何如所以異者何如並逐節次第形於楮墨以爲問津程途俾得尋文釋義不致魚目以混珠深知力行庶幾金鼎可烹汞以成無上至道而方諸瑶池之會不難與男仙同謁木公共朝金母矣天陽地陰乾剛坤順陰無陽不長陽無陰不生剛柔得其中和水火始能旣濟陰陽必有匹偶人物由兹孕生是乾坤皆秉眞元之氣男女各具不死之身乾曰大生可以道成正覺坤曰廣生亦能果證元君如謂坤陰難入仙道何以王母長處崑崙蟾蛾竊梁間之丹永作月宫皇后逍遥讀漆園之書自號瑶池謫仙洛神巫女自古維昭紫姑湘𡚱於今爲烈跡載史篇固可考也身秉坤德豈不能乎女子原來命有三紫白黃光不似男少上衰中成在下關頭一錯要深諳炁穴卽血元也卽乳房也在中一寸三分非兩乳也男命在丹田故以下田爲炁穴女命在乳房故以乳房爲炁穴陰極變陽從炁穴化陰血而流形於外故斬赤龍須從陰生之處用工久久行持形自隱矣若以男子臍下一寸三分中之炁穴指之則誤也許祖云男子修成不漏精女子修成不漏經蓋女子之經爲生人之始信經返成氣則乳縮如男子而經自不漏若男子則煉精化炁陰根縮如童子而精自不漏不漏而後命可延又云女子修到經不漏其後性命工夫與男子之功大同小異患無人以訣破其奥妙耳柔人行道與剛人不同而其成功比剛人亦易剛人伏氣三年柔人一年可伏以丹在身中故也孫不二元君曰男女本一炁淸濁動靜異女人欲修眞切使眞元聚陰中有元陽存淸勿以棄明此色與欲本來無所累屏除貪嗔癡割斷憂思慮去濁修淸性不墮諸惡趣靜寂守無爲我卽男子具無無無其形有有有其意内視色聲空毫無沾滯仗土爲坤基一陽本自地鉛汞固不同炁神無二義𣺌𣺌空靈心心神能爲制一炁反春和飛出雲霄去偕汝太淸遊是曰眞如偈夫乾道動坤道靜欲修性命務須從靜汝今原靜又何以修坤道濁乾道淸欲修性命務須求淸惟能以濁修淸是以入道證果長生胎元神用經曰成功之後男子關元炁聚精女人胎澤不結嬰雖動於慾不能與神爭此是成胎之中眞精返爲神此是上淸也
