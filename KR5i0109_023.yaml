front:
  text: 女丹合編旁門錄
  hash: sha256:1d6eaa3012cd3665819950eed677059fa9bce0bf279a851af84f84b97e45f22f
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_23p001a}
body:
  text: 黔中積善堂述響月文通古佛四首錯認彼我當作眞誰知陰陽在本身買妾宿娼行採戰欲奪元氣補精神豈有蓬萊仙家客反類浪子貪淫行夫曰彼者卽少郎卽元氣也曰我者卽美女卽元神也蓋以本身之陽炁點本身之陰神使神炁混合爲一便謂成道而旁門則謂我爲男子彼爲女子於是有買美女以豢養之使外黃婆探其壬癸將至行採戰以奪元氣者有買美妾宿娼妓行採戰以奪元氣者是皆錯認彼我二字犯了首惡天律王法冥刑俱不能逃安望成仙哉如此而欲成仙則蓬萊仙山盡是浪子淫婦矣平心而論有是理耶有是理耶此條害人極大古佛故首戒之脩道最要念頭淸先煉慧劍斬淫根不知煉劍反試劍猶如猛火𣷹油薪任是降龍伏虎手難免滲漏成濁精念頭不起純是先天念頭一起已落後天念頭若淸後天中猶存先天念頭不淸後天中全無先天念莫過於淫念淫念一動靈氣散矣淫念久住靈氣亡矣脩道者不怕念起只怕覺遲夫覺卽慧劍也卽覺卽斬隨覺隨斬時常覺照淫根自然斷絕此之謂大覺此之謂煉劍彼旁門不知煉劍妙法反以男女交媾爲試劍謂不動念則劍利謂一動念則劍鈍試問陽舉之時從無念起乎從有念起乎若無念而陽自舉此屬先天正好採取若有念而陽始舉此屬後天正宜降伏乃不降伏而反去行淫非猛火添油薪而何斯時也元神不能作主盡是識神用事則元精必成濁精矣欲其不滲漏不走洩也吾不信也此痛斥試劍者之非陽舉風吹引尾閭數次不散起周天三十六次陽火進陰符接用廿四全試問塵世脩眞者此法考自何仙傳陽舉引風吹散正法也若陽不息自有祕訣行小術者乃起小周天三十六從尾閭至夾脊上玉枕至泥丸而止此爲進陽火又從泥丸下十二重樓聽其自落如此者二十四次此爲退陰符接用從右圈左三十六從左圈右二十四以合周天之數行畢凝神打坐謂之沐浴謂之補閏餘不知周天甚活拘拘數之將心意盡於外功神何能安丹何能結亦徒勞無功耳此言小術之當戒滚轆圓圖轉胸前妄說傳自兩口仙强用方術把性煉未識眞性是先天仙佛傳下安神法妙無作爲聽自然滚轆圖者默大圈於胸前以大圈轉爲小圈將性束縛謂之煉性此方術也豈呂祖而傳此乎其誣呂祖也實甚蓋眞性極虛靈成仙成佛皆是此性如默一圈可以束性卽默一圈可以束仙佛矣此理易明不待智者能辨何竟墮諸術中而不覺也仙佛傳下安神之法卽煉性之法妙合自然不假强爲自能使性圓明以成大道吾隨古佛巡查所以旁門小術不少特載於書免誤後學右定一弟子譚仙敬註無量度世古佛四首朝朝面東口朝天鼓起眼睛聳着肩吐盡濁氣納淸氣脫胎換骨返童顔那知戾風入臟腑下田臌脹命難延納氣之術晨早向東鼓眼聳肩以大口吸之將淸氣納於内濁氣吐於外謂可成仙成佛那知遇着戾氣積於五臟六腑久之下田臌脹胸前壅塞竟自有脹死者噫求道無法死於非命可笑亦可憐矣癡人妄想做神仙忍渴不飲飢不餐自成餓鬼三塗墮反望飛昇大羅天許多聰明被此誤意魔一起外魔纒渴則飲飢則食養生之理也脩道者元氣充溢烟火可絕然而不飲不渴不食不飢方成神仙乃竟有求仙癡人閉門靜坐不講脩眞妙法而徒忍飢忍渴雖餓死而不辭信如斯言而凡世之飢而死者不皆列仙籍乎吾見許多聰明之士竟爲旁門所誤此蓋癡心妄想意魔一起而外魔卽將命索之矣癡人早尋眞師可也無端種火妄𣷹油鼻吸淸氣向外求引上泥丸雙關止逆而行之下重樓無火弄火復止火枉費精神到白頭世有種火𣷹油之法以鼻吸天地之淸氣用意引上泥丸至雙關而止復由雙關轉上泥丸過上雀橋咽下十二重樓至中田而止本無邪火就是好事而乃故意弄火復又止火是何法也是何道也誤用精神雖至白頭猶是有生死的凡夫其於金丹大道全未夢見盲脩瞎煉何益最厭盲師冒仙才五龍捧聖任意猜槖鑰出爐誇絕技物塞大便更癡呆詐人財物誤性命死受冥刑生受災此法出自方士當陽舉之時卽鼓巽風猛烹急煉若不散凝神交戰一二候以五指捧腎𦂳握龍頭如手淫一般名爲槖鑰出爐用撮舐吸閉四字訣將非法所成之濁精從三關逆上泥丸吞入黃庭接起周天圈左圈右共六十次又有謂大藥過關之時必用木器𦂳將大便抵塞以防走丹蓋大藥過關下雀橋自有路徑衝入尾閫直上與大便何相干涉而乃妄以酷刑處已哉此二法盲師視爲秘訣詐人財物戕人性命玄門壞到這步田地則生前豈能免大災死後豈能逃冥刑乎脩士急宜猛省右純精弟子張仙敬註水祖一首身藏仙丹藥最靈何勞奇方身外尋金石妄服多虧損紫河車味臭難聞更有下愚無知輩自食敗精類畜牲身中元氣卽是仙丹不意旁門野道竟於身外尋求奇方或煉金石服之自速其死或將紫河車食之同類相殘尤可恨者男女交媾後自餂敗精此與牛馬狗彘何殊謂食敗精而可成仙則牛馬狗彘不亦盡上天堂乎此由丹書服食二字誤之也看書固要明理尋師尤要有識右大覺靈光仙敬註大覺慈眞一化天地羣生佛二首欲使周身骨節通自誇搬運是神功吸氣一口運至下田從兩腳至膝至腳背轉入湧泉穴又從腳後跟至腿後上陽關透過雙關夾脊上兩膀至手背翻入手心又從手彎至後頸上王枕至泥丸下雀橋接下十二重樓落於丹田爲一周天龜首繫纒龜難死睡時用長帕將陽具包裏以繩起然後將帕與繩從背後繫於頸上側睡防陽舉走丹龍頭顚倒龍愈雄此法亦用長帕與繩將陽具包纒從當門繫於頸後以上頭對下頭兩目𦂳𦂳瞧着還有名爲八段錦搖頭擺尾拭腹從上而下二十六次叩齒三十六次津液咽下兩手乂腰周身故意擺動兩手掄拳用力如打人狀將頭左掉右掉反視兩腳後跟以兩腳尖立地十指相對上齊眉下齊地名周公禮獨腳站立用力舒腿行畢累了仰天出三口大氣名吐五弓赦濁氣每日飯後如此困倦亦如此一切蠻幹似癲瘋一切旁門蠻幹己極好似癲了瘋了一般行之者亦欲卻病延年亦欲成仙成佛吁實可笑也點石成金鐵成銀黃白僞術惑貪人創造丹室與丹器妄說萬兩始能成以黃白術惑人者謂此丹煉成可以點石成金點鐵成銀於是徧訪貪污之人勸伊出銀或數百兩或數十兩約凑數千之譜始可興工鍊丹有丹可點金銀從心所欲拏來創造極華麗之丹室極精巧之丹器以及鮮衣美食服役侍從皆賴此丹點之以足用此騙局也人多墮此計豈知脩煉在心性不分富貴俱可行人各有心人各有性不分富貴得法修之俱能有成安用黃白術爲哉安用丹室丹器一切華美爲哉貪人其深思焉可右如意眞金佛敬註彩雲琉璃佛一首手捧腎囊拭下田九九陽數左右全以左手捧腎囊右手拭下丹田八十一次右手捧腎囊左手拭下丹田八十一次蘇秦背劍眞難過此法用一蛾眉樹改成蛾眉板凭著壁頭以拱處抵背將髮繫在板上上綑右腳下綑左腳動作不得動必傾跌然後將財物盜去將婦女污辱懷中抱月笑温丹此法當寒冷之時用銅瓶裝開水放在臍上兩手捧着名爲温丹反躬曬肚情更苦此法用極灣之木拱起仰臥其上名爲曬丹自投羅網太迂酸這些旁門本不近情愚人多爲所弄自投羅網何其迂也右樹堂弟子紏查神敬註太極源淸佛一首目注臍下一寸三此係臭囊怎結丹臍下一寸三分此處極虛此處極臭謂結丹在此亦妄人也毛際外腎俱無益妄安鼎爐指玄關有觀毛際者有觀外腎者然眞鼎眞爐俱不在是觀之何益周身孔竅的眞處毫釐稍差隔天淵周身穴道不得眞傳終屬疑似切勿自恃右鑒察神張佑敬註淸風古佛一首三千六百旁門難以一一指明凡有作爲皆假旁門甚多難以書之竹帛故以凡有作爲該之淸淨自然乃眞淸淸淨淨自自然然乃是先天大道乃可成仙成佛萬殊歸於一本以一性字了之三乘約於一心以一心字了之以我練我最妙形神俱妙長生火内生金金陽也生於長生火内邪正昭然若揭何去何從有憑一部仙佛眞傳或邪或正言之了了觀者猶不知棄取耶果能棄邪歸正定許白日飛昇棄邪歸正仙佛度人之心也此首結通部右救劫天尊敬註
