front:
  text: 女丹合編樵陽經女工修煉
  hash: sha256:f46d613a97c6ea0703c315c8887231cc48917a6bf233acb899355550d831304e
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-EX_KR5i0109_11p001a}
body:
  text: 純陽呂祖傳濟一子傅金銓述太陰煉形與男子修煉之法大同小異初功下手閉目存神大休歇一場使心靜息調而後凝神入於氣穴在兩乳間心窩上將兩手交乂捧乳輕輕揉摩二十遍將氣自下丹田微微吸起三十六口仍用手捧乳返照調息久久自然真氣往來一開一闔養成鄞鄂神氣充足真陽自旺其經水自絶乳如男子是謂斬赤龍如此久久行持後不必捧乳吸氣只凝神於氣穴回光返照是謂𢆯牝之門也真息悠悠虛極靜篤陽氣薰蒸河車運轉萬朵紫雲籠玉宇千條血脈貫泥丸自覺一點靈光不內不外自下田上升絳宮泥丸下重樓歸於金胎神室回光凝神真息住於中宮鼎內是神入室矣是為𢆯牝是為胎仙即一點落黃庭也其後十月功夫陽神出現粉碎虛空一路修真與男子同無彼此之別也
  hash: sha256:c446b972077997de5af6f362408f99f4aa197a8201dc2336dc2723137ac81378
