body:
  text: 女丹合編響月文通古佛旁門小術小引旁門者顯與道違者也小術者隱與道違者也夫大道至玄至妙至簡至易不雜一毫私意不參一毫欲念方是道根凡不合夫天地之氣運不合夫聖賢之正理不合夫性情之存發者皆屬旁門小術然旁門小術極多吾欲詳指之又恐傷忠厚吾欲隱忍之又恐誤後學故特將塵世之大壞心術大壞玄門者姑舉數十條以塞其流毒亦是拔出深淵救出火坑之婆心也凡修士有墮此術中者急早回頭亡羊補牢亦不為晚若疑感有信固執不通自害而復害人不惟不能結大緣而且難望好結果矣萬佛緣在邇當時修士共凜之三淸殿有路後世修士嚴辨之
